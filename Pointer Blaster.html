<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointer Blaster - Space Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }

/* Game Wrapper: Handles centering & scaling */
#game-wrapper {
  position: absolute;
  top: 50%; left: 50%;
  transform-origin: center center;
  width: 1280px;
  height: 720px;
  pointer-events: none; /* Let clicks pass through to canvas where needed */
}

canvas {
  width: 100%;
  height: 100%;
  border: 2px solid #1a1a3e;
  box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
  background: #000;
  display: block;
}

#ui-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; color: #fff; pointer-events: none; z-index: 10; width: 100%;
}
#ui-overlay.hidden { display: none; }
#ui-overlay h1 { font-size: 48px; color: #00d4ff; text-shadow: 0 0 20px #00d4ff, 0 0 40px #0066ff; margin-bottom: 10px; letter-spacing: 6px; }
#ui-overlay h2 { font-size: 28px; color: #ff4444; text-shadow: 0 0 15px #ff4444; margin-bottom: 10px; }
#ui-overlay p { font-size: 16px; color: #aaa; margin: 5px 0; }
#ui-overlay .start-text { font-size: 20px; color: #00ff88; text-shadow: 0 0 10px #00ff88; animation: pulse 1.5s infinite; margin-top: 20px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Interactive Elements */
#title-buttons, #highscore-form, #highscore-view, .btn, #player-name, #submit-score, #back-btn, #settings-panel {
    pointer-events: auto;
}
.btn {
    padding: 12px 24px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    color: #000;
    background: #00d4ff;
    border: none;
    cursor: pointer;
    margin: 10px;
    text-transform: uppercase;
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    transition: all 0.2s;
}
.btn:hover {
    background: #fff;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
    transform: scale(1.05);
}
.btn-secondary {
    background: #444;
    color: #fff;
    box-shadow: none;
}
.btn-secondary:hover {
    background: #666;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

/* Settings Panel */
#settings-panel {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #333;
    background: rgba(0,0,0,0.8);
    display: inline-block;
}
#settings-panel span { color: #aaa; margin: 0 10px; font-size: 14px; }

/* Game Over & High Score UI */
#gameover-ui { display: none; }
#gameover-ui.visible { display: block; }
#highscore-form { margin: 15px 0; pointer-events: auto; }
#player-name { padding: 10px; font-family: 'Courier New', monospace; font-size: 16px; text-align: center; background: #0a0a2e; border: 2px solid #00d4ff; color: #fff; margin-bottom: 8px; width: 200px; outline: none; }
#player-name:focus { box-shadow: 0 0 10px #00d4ff; }
#submit-score { padding: 10px 20px; font-family: 'Courier New', monospace; font-size: 16px; background: #00d4ff; border: none; color: #000; cursor: pointer; font-weight: bold; }
#submit-score:hover { background: #00b3cc; }
#highscore-list { margin: 10px 0; pointer-events: auto; }
#highscore-list h3 { color: #ffdd00; margin-bottom: 8px; font-size: 18px; text-shadow: 0 0 8px #ffdd00; }
#highscore-list p { color: #aaa; margin: 4px 0; font-size: 14px; }
#highscore-list p.highlight { color: #00ff88; font-weight: bold; text-shadow: 0 0 5px #00ff88; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay">
    <h1>POINTER BLASTER</h1>
    
    <!-- Menu UI -->
    <div id="menu-ui">
      <p>WASD / Arrow Keys to move</p>
      <p>Click or Space to shoot</p>
      <div id="title-buttons">
        <button id="start-btn" class="btn">START GAME</button>
        <button id="highscore-btn" class="btn btn-secondary">HIGH SCORES</button>
      </div>
      
      <!-- Settings Panel -->
      <div id="settings-panel">
        <span>RESOLUTION:</span>
        <button class="btn" id="res-720" style="padding: 5px 10px; font-size: 12px;">720p</button>
        <button class="btn" id="fs-btn" style="padding: 5px 10px; font-size: 12px;">FULLSCREEN</button>
      </div>

      <p class="start-text">Press ENTER to start</p>
    </div>

    <!-- High Score View UI -->
    <div id="highscore-view" class="hidden">
      <h2 style="color: #ffdd00; margin-bottom: 20px;">TOP SCORES</h2>
      <div id="highscore-list"></div>
      <button id="back-btn" class="btn btn-secondary">BACK TO MENU</button>
    </div>

    <!-- Game Over UI -->
    <div id="gameover-ui">
      <h2>GAME OVER</h2>
      <p>Score: <span id="final-score">0</span></p>
      <p>Wave: <span id="final-wave">1</span></p>
      <div id="highscore-form" class="hidden">
        <input type="text" id="player-name" maxlength="10" placeholder="Enter your name" />
        <br>
        <button id="submit-score">Submit</button>
      </div>
      <div id="gameover-highscore-list"></div>
      <p class="start-text">Press ENTER to restart</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('ui-overlay');
const wrapper = document.getElementById('game-wrapper');

// UI Elements
const menuUI = document.getElementById('menu-ui');
const gameoverUI = document.getElementById('gameover-ui');
const highscoreView = document.getElementById('highscore-view');
const finalScoreEl = document.getElementById('final-score');
const finalWaveEl = document.getElementById('final-wave');
const highscoreForm = document.getElementById('highscore-form');
const playerNameInput = document.getElementById('player-name');
const submitScoreBtn = document.getElementById('submit-score');
const highscoreList = document.getElementById('highscore-list');
const gameoverHighscoreList = document.getElementById('gameover-highscore-list');

// High Score System
const HIGHSCORE_KEY = 'pointerBlasterHighScores';
const MAX_HIGHSCORES = 10;
let highScores = [];

function loadHighScores() {
  try {
    const stored = localStorage.getItem(HIGHSCORE_KEY);
    if (stored) {
      highScores = JSON.parse(stored);
    } else {
      highScores = [
        { name: 'DarkTower', score: 21200 }, { name: 'DarkTower', score: 20500 },
        { name: 'DarkTower', score: 19800 }, { name: 'DarkTower', score: 18900 },
        { name: 'DarkTower', score: 17500 }, { name: 'DarkTower', score: 16200 },
        { name: 'DarkTower', score: 15000 }, { name: 'DarkTower', score: 13800 },
        { name: 'DarkTower', score: 12500 }, { name: 'DarkTower', score: 11000 }
      ];
    }
  } catch (e) { highScores = []; }
}

function saveHighScore(name, score) {
  const cleanName = name.trim().substring(0, 10) || 'Anonymous';
  highScores.push({ name: cleanName, score });
  highScores.sort((a, b) => b.score - a.score);
  highScores = highScores.slice(0, MAX_HIGHSCORES);
  try { localStorage.setItem(HIGHSCORE_KEY, JSON.stringify(highScores)); } catch (e) {}
}

function displayHighScores(element, currentScore = -1) {
  element.innerHTML = '';
  if (highScores.length === 0) {
    element.innerHTML = '<p>No scores yet. Be the first!</p>';
    return;
  }
  highScores.forEach((hs, i) => {
    const isCurrentRun = hs.score === currentScore;
    const className = isCurrentRun ? 'highlight' : '';
    element.innerHTML += `<p class="${className}">${i + 1}. ${hs.name} - ${hs.score.toLocaleString()}</p>`;
  });
}

// Game state
let gameState = 'menu';
let score = 0;
let wave = 1;
let waveTimer = 900;
const WAVE_DURATION = 900;
let waveSpawnTimer = 0;
let screenShake = 0;
let slowMo = 0;
let isBossWave = false;
let bossWaveTimer = 0;

// Input
const keys = {};
let mouseDown = false;
let mouseX = 0, mouseY = 0;

document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Enter' && (gameState === 'menu' || gameState === 'gameover')) startGame();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousedown', e => { mouseDown = true; if (gameState === 'playing') shoot(); });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

// UI Button Listeners
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('highscore-btn').addEventListener('click', () => {
  menuUI.classList.add('hidden');
  highscoreView.classList.remove('hidden');
  displayHighScores(highscoreList);
});
document.getElementById('back-btn').addEventListener('click', () => {
  highscoreView.classList.add('hidden');
  menuUI.classList.remove('hidden');
});

// Resolution & Fullscreen Logic
document.getElementById('res-720').addEventListener('click', () => setResolution(1280, 720));
document.getElementById('fs-btn').addEventListener('click', toggleFullscreen);

playerNameInput.addEventListener('keydown', e => e.stopPropagation());
submitScoreBtn.addEventListener('keydown', e => e.stopPropagation());
submitScoreBtn.addEventListener('click', () => {
  const name = playerNameInput.value;
  if (name.trim()) {
    saveHighScore(name, score);
    highscoreForm.classList.add('hidden');
    displayHighScores(gameoverHighscoreList, score);
  }
});

// Player
const player = {
  x: 500, y: 600, w: 30, h: 36,
  speed: 5, hp: 100, maxHp: 100,
  fireRate: 8, fireTimer: 0,
  invincible: 0,
  powerLevel: 1,
  powerTimer: 0,
  shieldActive: false, shieldTimer: 0, shieldAngle: 0,
  lives: 3 // ✨ NEW: Lives system
};

let bullets = [], enemies = [], particles = [], stars = [], powerups = [], enemyBullets = [], floatingTexts = [], shards = [];

// ✨ NEW: Galaxy System
let galaxies = [];

function initGalaxies() {
  galaxies = [];
  // Create between 10 and 20 galaxies
  const count = 10 + Math.floor(Math.random() * 10);
  
  for (let i = 0; i < count; i++) {
    // ✨ DEPTH LOGIC: Determine if this galaxy is "far" or "near"
    const isNear = Math.random() > 0.7; // 30% chance to be near
    
    let size = isNear ? 150 + Math.random() * 150 : 40 + Math.random() * 60;
    let speed = isNear ? 0.3 : 0.05; // Near ones move faster (parallax)
    let opacity = isNear ? 0.4 : 0.1;
    
    // Random colors for nebula/galaxy effect
    const hue = Math.random() * 360;
    const color1 = `hsla(${hue}, 80%, 60%, 0.8)`;
    const color2 = `hsla(${hue + 40}, 80%, 40%, 0.2)`;
    
    galaxies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: size,
      speed: speed,
      opacity: opacity,
      color1: color1,
      color2: color2,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.005
    });
  }
}

function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5, speed: Math.random() * 1.5 + 0.3,
      brightness: Math.random()
    });
  }
}

function setResolution(w, h) {
  canvas.width = w;
  canvas.height = h;
  wrapper.style.width = w + 'px';
  wrapper.style.height = h + 'px';
  updateScale();
}

function updateScale() {
  const baseW = 1280;
  const baseH = 720;
  // Subtract 10px margin to prevent scrollbar interference
  const scale = Math.min((window.innerWidth - 10) / baseW, (window.innerHeight - 10) / baseH);
  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    wrapper.requestFullscreen().catch(err => {
      console.log(`Error attempting to enable full-screen mode: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
}

function startGame() {
  gameState = 'playing';
  score = 0; wave = 1; waveTimer = WAVE_DURATION; waveSpawnTimer = 0;
  isBossWave = false; bossWaveTimer = 0;
  
  // ✨ NEW: Reset lives and power level on start
  player.lives = 3;
  player.powerLevel = 1;
  player.hp = player.maxHp;
  
  player.x = canvas.width / 2; player.y = canvas.height - 80;
  player.invincible = 60; // Brief invincibility on start
  bullets = []; enemies = []; particles = []; powerups = []; enemyBullets = []; floatingTexts = []; shards = [];
  
  overlay.classList.add('hidden');
  menuUI.classList.add('hidden');
  highscoreView.classList.add('hidden');
  gameoverUI.classList.remove('visible');
  highscoreForm.classList.add('hidden');
  playerNameInput.value = '';
  
  spawnWave(wave);
}

function spawnWave(waveNum) {
  if (waveNum % 3 === 0) {
    isBossWave = true; bossWaveTimer = 0;
    addFloatingText(canvas.width/2, canvas.height/2, "WARNING: BOSS PAIR INCOMING", "#ff00ff");
    setTimeout(() => { if (gameState === 'playing') spawnBoss(canvas.width * 0.3); }, 0);
    setTimeout(() => { if (gameState === 'playing') spawnBoss(canvas.width * 0.7); }, 500);
  } else {
    isBossWave = false;
    const count = Math.min(5, 2 + Math.floor(waveNum / 3));
    for (let i = 0; i < count; i++) setTimeout(() => { if (gameState === 'playing') spawnEnemy(); }, i * 300);
  }
}

const BOSS_SHAPES = ['hexagon', 'circle', 'diamond', 'triangle', 'pentagon', 'star', 'cross', 'octagon', 'arrow', 'square'];

function spawnBoss(x) {
  const bossTemplate = {
    hp: 300 + (wave * 50), speed: 0.6, size: 60,
    color: '#ff00ff', score: 1000, fireRate: 60, type: 'boss',
    shapeType: BOSS_SHAPES[Math.floor(Math.random() * BOSS_SHAPES.length)]
  };
  enemies.push({
    x, y: -bossTemplate.size, type: 'boss',
    hp: bossTemplate.hp, maxHp: bossTemplate.hp, speed: bossTemplate.speed,
    size: bossTemplate.size, color: bossTemplate.color, score: bossTemplate.score,
    fireRate: bossTemplate.fireRate, fireTimer: Math.random() * bossTemplate.fireRate,
    angle: 0, zigTimer: Math.random() * Math.PI * 2, flashTimer: 0, shapeType: bossTemplate.shapeType
  });
}

// ✨ UPDATED: Extended to 5 power levels with backward shots for 4 & 5
function shoot() {
  if (player.fireTimer > 0) return;
  player.fireTimer = player.fireRate;
  const bSpeed = -10;
  const bSpeedBack = 8; // Backward bullet speed

  if (player.powerLevel >= 5) {
    // Level 5: Triple front + Triple back
    bullets.push({ x: player.x - 14, y: player.y - 18, vx: -2.5, vy: bSpeed, damage: 10, color: '#00ffcc' });
    bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: bSpeed, damage: 15, color: '#00d4ff' });
    bullets.push({ x: player.x + 14, y: player.y - 18, vx: 2.5, vy: bSpeed, damage: 10, color: '#00ffcc' });
    // Backward spread
    bullets.push({ x: player.x - 14, y: player.y + 18, vx: -2.5, vy: bSpeedBack, damage: 8, color: '#ffaa00' });
    bullets.push({ x: player.x, y: player.y + 20, vx: 0, vy: bSpeedBack, damage: 10, color: '#ff8800' });
    bullets.push({ x: player.x + 14, y: player.y + 18, vx: 2.5, vy: bSpeedBack, damage: 8, color: '#ffaa00' });
  } else if (player.powerLevel >= 4) {
    // Level 4: Double front + Double back
    bullets.push({ x: player.x - 10, y: player.y - 18, vx: -1.8, vy: bSpeed, damage: 12, color: '#00d4ff' });
    bullets.push({ x: player.x + 10, y: player.y - 18, vx: 1.8, vy: bSpeed, damage: 12, color: '#00d4ff' });
    // Backward spread
    bullets.push({ x: player.x - 10, y: player.y + 18, vx: -1.8, vy: bSpeedBack, damage: 8, color: '#ff8800' });
    bullets.push({ x: player.x + 10, y: player.y + 18, vx: 1.8, vy: bSpeedBack, damage: 8, color: '#ff8800' });
  } else if (player.powerLevel >= 3) {
    // Level 3: Triple front
    bullets.push({ x: player.x - 14, y: player.y - 18, vx: -2.5, vy: bSpeed, damage: 10, color: '#00ffcc' });
    bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: bSpeed, damage: 15, color: '#00d4ff' });
    bullets.push({ x: player.x + 14, y: player.y - 18, vx: 2.5, vy: bSpeed, damage: 10, color: '#00ffcc' });
  } else if (player.powerLevel >= 2) {
    // Level 2: Double front
    bullets.push({ x: player.x - 10, y: player.y - 18, vx: -1.8, vy: bSpeed, damage: 12, color: '#00d4ff' });
    bullets.push({ x: player.x + 10, y: player.y - 18, vx: 1.8, vy: bSpeed, damage: 12, color: '#00d4ff' });
  } else {
    // Level 1: Single front
    bullets.push({ x: player.x, y: player.y - 18, vx: 0, vy: bSpeed, damage: 10, color: '#00d4ff' });
  }
  for (let i = 0; i < 3; i++) particles.push(createParticle(player.x, player.y - 20, '#00d4ff', 3, 15));
}

function spawnEnemy() {
  const types = ['basic', 'fast', 'tank', 'shooter', 'zigzag'];
  let available = ['basic'];
  if (wave >= 2) available.push('fast');
  if (wave >= 3) available.push('tank', 'shooter');
  if (wave >= 4) available.push('zigzag');
  const type = available[Math.floor(Math.random() * available.length)];
  const x = Math.random() * (canvas.width - 60) + 30;
  const templates = {
    basic: { hp: 20, speed: 1.5, size: 18, color: '#ff4444', score: 10, fireRate: 0 },
    fast: { hp: 12, speed: 3.5, size: 14, color: '#ffaa00', score: 15, fireRate: 0 },
    tank: { hp: 60, speed: 0.8, size: 28, color: '#aa44ff', score: 30, fireRate: 0 },
    shooter: { hp: 30, speed: 1.2, size: 20, color: '#ff6644', score: 25, fireRate: 90 },
    zigzag: { hp: 25, speed: 2, size: 16, color: '#44ffaa', score: 20, fireRate: 0 }
  };
  const t = templates[type];
  enemies.push({
    x, y: -t.size, type, hp: t.hp + wave * 3, maxHp: t.hp + wave * 3,
    speed: t.speed, size: t.size, color: t.color, score: t.score,
    fireRate: t.fireRate, fireTimer: Math.random() * t.fireRate,
    angle: 0, zigTimer: Math.random() * Math.PI * 2, flashTimer: 0
  });
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return;
  const types = ['power', 'health', 'shield', 'nuke'];
  const colors = { power: '#ffdd00', health: '#00ff66', shield: '#00aaff', nuke: '#ff4400' };
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({ x, y, type, color: colors[type], size: 12, vy: 1.5, timer: 300, angle: 0 });
}

function createParticle(x, y, color, size, life) {
  const angle = Math.random() * Math.PI * 2, speed = Math.random() * 3 + 1;
  return { x, y, color, size, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life, maxLife: life, decay: Math.random() * 0.02 + 0.02 };
}

function createShards(x, y, color, size) {
  const count = 2 + Math.floor(Math.random() * 2);
  for(let i=0; i<count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 2;
    shards.push({
      x, y, color, size: size * 0.6,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      rotation: Math.random() * Math.PI,
      rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
}

function explode(x, y, color, count = 20) {
  for (let i = 0; i < count; i++) particles.push(createParticle(x, y, color, Math.random() * 4 + 2, Math.random() * 30 + 15));
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    particles.push({ x, y, color: '#ffffff', size: 3, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4, life: 20, maxLife: 20, decay: 0.05 });
  }
}

function addFloatingText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 60, vy: -1.5 }); }

function showGameOver() {
  gameState = 'gameover';
  explode(player.x, player.y, '#00d4ff', 50); explode(player.x, player.y, '#ffffff', 30);
  finalScoreEl.textContent = score.toLocaleString(); finalWaveEl.textContent = wave;
  const qualifies = highScores.length < MAX_HIGHSCORES || score > highScores[highScores.length - 1].score;
  if (qualifies) { highscoreForm.classList.remove('hidden'); playerNameInput.focus(); }
  else { highscoreForm.classList.add('hidden'); }
  displayHighScores(gameoverHighscoreList, score);
  overlay.classList.remove('hidden'); menuUI.classList.add('hidden'); gameoverUI.classList.add('visible');
}

function update() {
  if (gameState !== 'playing') return;
  const dt = slowMo > 0 ? 0.5 : 1;
  if (slowMo > 0) slowMo--;
  if (screenShake > 0) { screenShake *= 0.9; if (screenShake < 0.1) screenShake = 0; }

  let dx = 0, dy = 0;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.x += dx * player.speed * dt; player.y += dy * player.speed * dt;
  player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
  player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

  if (mouseDown) shoot(); if (keys[' ']) shoot();
  if (player.fireTimer > 0) player.fireTimer -= dt;
  if (player.invincible > 0) player.invincible -= dt;
  if (player.shieldTimer > 0) {
    player.shieldTimer -= dt; player.shieldAngle += 0.05;
    if (player.shieldTimer <= 0) player.shieldActive = false;
  }

  if (isBossWave) {
    bossWaveTimer++;
    if (bossWaveTimer >= 600) { for(let i=0; i<4; i++) spawnEnemy(); bossWaveTimer = 0; }
    const bossesAlive = enemies.filter(e => e.type === 'boss').length;
    if (bossesAlive === 0) {
      wave++; waveTimer = WAVE_DURATION; waveSpawnTimer = 0; isBossWave = false; bossWaveTimer = 0;
      screenShake = 20; addFloatingText(canvas.width/2, canvas.height/2, "WAVE COMPLETE", "#00ff88");
      spawnWave(wave);
    }
  } else {
    waveTimer--; waveSpawnTimer++;
    if (waveSpawnTimer >= 120) { spawnWave(wave); waveSpawnTimer = 0; }
    if (waveTimer <= 0) {
      wave++; waveTimer = WAVE_DURATION; waveSpawnTimer = 0;
      enemies.forEach(e => explode(e.x, e.y, e.color, 10)); enemies = []; enemyBullets = []; screenShake = 15;
      spawnWave(wave);
    }
  }

  bullets = bullets.filter(b => { b.x += b.vx * dt; b.y += b.vy * dt; return b.y > -10 && b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10; });
  enemyBullets = enemyBullets.filter(b => { b.x += b.vx * dt; b.y += b.vy * dt; return b.y > -10 && b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10; });

  enemies = enemies.filter(e => {
    e.y += e.speed * dt; e.angle += 0.02; e.flashTimer = Math.max(0, e.flashTimer - dt);
    if (e.type === 'boss') {
      e.zigTimer += 0.02 * dt; e.x += Math.sin(e.zigTimer) * 3;
      if (e.y > canvas.height - e.size - 20) e.speed = -Math.abs(e.speed);
      if (e.y < e.size) e.speed = Math.abs(e.speed);
      if (e.x < e.size) e.x = e.size; if (e.x > canvas.width - e.size) e.x = canvas.width - e.size;
    } else if (e.type === 'zigzag') { e.zigTimer += 0.03 * dt; e.x += Math.sin(e.zigTimer) * 3; }
    if (e.fireRate > 0) {
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        e.fireTimer = e.fireRate;
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({ x: e.x, y: e.y + e.size, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3, size: e.type === 'boss' ? 8 : 5, color: '#ff4444' });
      }
    }
    return e.y < canvas.height + 50 && e.hp > 0;
  });

  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i], hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      if (Math.abs(b.x - e.x) < e.size + 5 && Math.abs(b.y - e.y) < e.size + 5) {
        e.hp -= b.damage; e.flashTimer = 4; hit = true;
        for (let k = 0; k < 5; k++) particles.push(createParticle(b.x, b.y, e.color, 2, 15));
        if (e.hp <= 0) { 
          score += e.score; 
          createShards(e.x, e.y, e.color, e.size);
          explode(e.x, e.y, e.color, 30); 
          screenShake = 5; 
          addFloatingText(e.x, e.y, '+' + e.score, '#ffdd00'); 
          spawnPowerup(e.x, e.y); 
        }
        break;
      }
    }
    if (hit) bullets.splice(i, 1);
  }

  if (player.invincible <= 0) {
    let tookDamage = false;
    enemyBullets.forEach((b, bi) => {
      if (Math.abs(b.x - player.x) < 12 && Math.abs(b.y - player.y) < 16) {
        enemyBullets.splice(bi, 1);
        if (player.shieldActive) { player.shieldActive = false; player.shieldTimer = 0; explode(player.x, player.y, '#00aaff', 15); }
        else { player.hp -= 10; tookDamage = true; player.invincible = 30; screenShake = 8; explode(player.x, player.y, '#ff4444', 10); }
      }
    });
    enemies.forEach((e, ei) => {
      if (Math.abs(e.x - player.x) < e.size + 10 && Math.abs(e.y - player.y) < e.size + 14) {
        if (player.shieldActive) { player.shieldActive = false; player.shieldTimer = 0; e.hp -= 30; explode(player.x, player.y, '#00aaff', 15); if (e.hp <= 0) { score += e.score; explode(e.x, e.y, e.color, 30); } }
        else { player.hp -= 25; tookDamage = true; player.invincible = 45; screenShake = 12; explode(player.x, player.y, '#ff4444', 20); e.hp -= 20; if (e.hp <= 0) { score += e.score; explode(e.x, e.y, e.color, 30); } }
      }
    });
    
    // ✨ UPDATED: Power level now decrements by 1 instead of resetting to 1
    if (tookDamage) {
      player.powerLevel = Math.max(1, player.powerLevel - 1);
    }
  }

  // ✨ UPDATED: Handle lives instead of instant game over
  if (player.hp <= 0) {
    player.lives--;
    if (player.lives > 0) {
      player.hp = player.maxHp;
      player.invincible = 120; // 2 seconds invincibility on respawn
      player.x = canvas.width / 2;
      player.y = canvas.height - 80;
      screenShake = 15;
      addFloatingText(player.x, player.y, "LIVES: " + player.lives, "#00ff88");
    } else {
      showGameOver();
    }
  }

  powerups = powerups.filter(p => {
    p.y += p.vy; p.angle += 0.05;
    if (p.y > canvas.height + 20) return false;
    if (Math.abs(p.x - player.x) < 25 && Math.abs(p.y - player.y) < 25) {
      if (p.type === 'power') { 
        // ✨ UPDATED: Cap power level at 5
        player.powerLevel = Math.min(5, player.powerLevel + 1); 
        addFloatingText(p.x, p.y, `POWER LV: ${player.powerLevel}`, '#ffdd00'); 
      }
      else if (p.type === 'health') { player.hp = Math.min(player.maxHp, player.hp + 30); addFloatingText(p.x, p.y, '+30 HP', '#00ff66'); }
      else if (p.type === 'shield') { player.shieldActive = true; player.shieldTimer = 300; addFloatingText(p.x, p.y, 'SHIELD!', '#00aaff'); }
      else if (p.type === 'nuke') {
        addFloatingText(p.x, p.y, 'NUKE!', '#ff4400');
        enemies.forEach(e => { score += e.score; explode(e.x, e.y, e.color, 30); screenShake = 10; });
        enemies = []; enemyBullets = []; explode(p.x, p.y, '#ff4400', 60); explode(p.x, p.y, '#ffffff', 40); screenShake = 25;
      }
      explode(p.x, p.y, p.color, 10); return false;
    }
    return true;
  });

  particles = particles.filter(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.97; p.vy *= 0.97; p.life -= dt; return p.life > 0; });
  
  shards = shards.filter(s => {
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 0.1 * dt;
    s.rotation += s.rotSpeed;
    s.life = (s.life || 100) - dt;
    return s.life > 0;
  });

  floatingTexts = floatingTexts.filter(t => { t.y += t.vy; t.life -= dt; return t.life > 0; });
  
  // ✨ UPDATED: Update galaxies
  galaxies.forEach(g => {
    g.x += g.speed * dt;
    if (g.x > canvas.width + g.size) g.x = -g.size;
    g.rotation += g.rotSpeed;
  });
  
  stars.forEach(s => { s.y += s.speed * dt; if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; } s.brightness = 0.5 + Math.sin(Date.now() * 0.003 + s.x) * 0.3; });
}

function draw() {
  ctx.save();
  if (screenShake > 0) ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#050510'); grad.addColorStop(0.5, '#0a0a2e'); grad.addColorStop(1, '#0f0f1a');
  ctx.fillStyle = grad; ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
  
  // ✨ NEW: Draw Galaxies
  galaxies.forEach(g => {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.rotation);
    ctx.globalAlpha = g.opacity;
    
    // Create a glowing nebula/galaxy effect
    let radialGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, g.size);
    radialGrad.addColorStop(0, g.color1);
    radialGrad.addColorStop(0.4, g.color2);
    radialGrad.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.fillStyle = radialGrad;
    ctx.beginPath();
    ctx.arc(0, 0, g.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  
  ctx.globalAlpha = 1;
  stars.forEach(s => { ctx.globalAlpha = s.brightness; ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); });
  ctx.globalAlpha = 1;

  if (gameState === 'playing' || gameState === 'gameover') {
    powerups.forEach(p => {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
      ctx.shadowColor = p.color; ctx.shadowBlur = 15; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = p.color; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const symbols = { power: 'P', health: '+', shield: 'S', nuke: '☢' };
      ctx.fillText(symbols[p.type], 0, 0); ctx.shadowBlur = 0; ctx.restore();
    });
    enemyBullets.forEach(b => {
      ctx.shadowColor = b.color; ctx.shadowBlur = 10; ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.size * 0.4, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
    });
    
    shards.forEach(s => {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rotation);
      ctx.fillStyle = s.color;
      ctx.fillRect(-s.size/2, -s.size/2, s.size, s.size);
      ctx.restore();
    });

    enemies.forEach(e => {
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.shadowColor = e.flashTimer > 0 ? '#ffffff' : e.color; ctx.shadowBlur = e.flashTimer > 0 ? 20 : 10;
      ctx.fillStyle = e.flashTimer > 0 ? '#ffffff' : e.color; ctx.beginPath();
      
      if (e.type === 'boss') {
        const s = e.size;
        switch(e.shapeType) {
          case 'hexagon': for (let i = 0; i < 6; i++) { const a = (i / 6) * Math.PI * 2 - Math.PI / 2; ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s); } break;
          case 'circle': ctx.arc(0, 0, s, 0, Math.PI * 2); break;
          case 'diamond': ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0); ctx.closePath(); break;
          case 'triangle': ctx.moveTo(0, -s); ctx.lineTo(s * 0.866, s * 0.5); ctx.lineTo(-s * 0.866, s * 0.5); ctx.closePath(); break;
          case 'pentagon': for (let i = 0; i < 5; i++) { const a = (i / 5) * Math.PI * 2 - Math.PI / 2; ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s); } break;
          case 'star': for (let i = 0; i < 10; i++) { const a = (i / 10) * Math.PI * 2 - Math.PI / 2; const r = i % 2 === 0 ? s : s * 0.5; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); } ctx.closePath(); break;
          case 'cross': ctx.moveTo(-s*0.3, -s); ctx.lineTo(s*0.3, -s); ctx.lineTo(s*0.3, -s*0.3); ctx.lineTo(s, -s*0.3); ctx.lineTo(s, s*0.3); ctx.lineTo(s*0.3, s*0.3); ctx.lineTo(s*0.3, s); ctx.lineTo(-s*0.3, s); ctx.lineTo(-s*0.3, s*0.3); ctx.lineTo(-s, s*0.3); ctx.lineTo(-s, -s*0.3); ctx.lineTo(-s*0.3, -s*0.3); ctx.closePath(); break;
          case 'octagon': for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2 - Math.PI / 8; ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s); } ctx.closePath(); break;
          case 'arrow': ctx.moveTo(0, -s); ctx.lineTo(s*0.6, -s*0.4); ctx.lineTo(s, 0); ctx.lineTo(s*0.6, s*0.4); ctx.lineTo(s*0.3, s*0.4); ctx.lineTo(s*0.3, s); ctx.lineTo(-s*0.3, s); ctx.lineTo(-s*0.3, s*0.4); ctx.lineTo(-s, 0); ctx.lineTo(-s*0.6, -s*0.4); ctx.closePath(); break;
          case 'square': ctx.rect(-s, -s, s*2, s*2); break;
        }
        ctx.closePath();
      } 
      else if (e.type === 'tank') {
        for (let i = 0; i < 6; i++) { const a = (i / 6) * Math.PI * 2 - Math.PI / 2; const px = Math.cos(a) * e.size, py = Math.sin(a) * e.size; i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); } ctx.closePath();
      } 
      else if (e.type === 'fast') { ctx.moveTo(0, e.size); ctx.lineTo(-e.size, -e.size * 0.6); ctx.lineTo(e.size, -e.size * 0.6); ctx.closePath(); }
      else if (e.type === 'shooter') { ctx.moveTo(0, e.size); ctx.lineTo(-e.size * 0.7, 0); ctx.lineTo(0, -e.size); ctx.lineTo(e.size * 0.7, 0); ctx.closePath(); }
      else { ctx.moveTo(0, e.size); ctx.lineTo(-e.size, -e.size * 0.5); ctx.lineTo(e.size, -e.size * 0.5); ctx.closePath(); }
      
      ctx.fill();
      
      if (e.type === 'boss') {
        const hpRatio = e.hp / e.maxHp;
        ctx.save();
        ctx.translate(0, 0);
        if (hpRatio < 0.75) {
          ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 15; ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(-e.size*0.5, -e.size*0.3); ctx.lineTo(0, 0); ctx.lineTo(e.size*0.4, e.size*0.5); ctx.stroke();
        }
        if (hpRatio < 0.5) {
          ctx.beginPath(); ctx.moveTo(e.size*0.6, -e.size*0.4); ctx.lineTo(0, e.size*0.2); ctx.lineTo(-e.size*0.5, e.size*0.6); ctx.stroke();
        }
        if (hpRatio < 0.25) {
          ctx.beginPath(); ctx.moveTo(-e.size*0.7, 0); ctx.lineTo(e.size*0.3, e.size*0.4); ctx.stroke();
          ctx.fillStyle = 'rgba(255, 100, 0, 0.35)';
          ctx.beginPath(); ctx.arc(e.size*0.3, -e.size*0.3, e.size*0.2, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(-e.size*0.4, e.size*0.2, e.size*0.15, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      
      if (e.hp < e.maxHp) {
        const barW = e.size * 2, barH = 5;
        ctx.fillStyle = '#333'; ctx.fillRect(-barW / 2, -e.size - 15, barW, barH);
        ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#00ff66' : e.hp / e.maxHp > 0.25 ? '#ffaa00' : '#ff4444';
        ctx.fillRect(-barW / 2, -e.size - 15, barW * (e.hp / e.maxHp), barH);
        if(e.type === 'boss') { ctx.fillStyle = '#fff'; ctx.font = '10px Courier New'; ctx.textAlign = 'center'; ctx.fillText("VOID CORE", 0, -e.size - 20); }
      }
      ctx.shadowBlur = 0; ctx.restore();
    });

    bullets.forEach(b => {
      ctx.shadowColor = b.color; ctx.shadowBlur = 12; ctx.fillStyle = b.color;
      ctx.fillRect(b.x - 2, b.y - 8, 4, 16); ctx.fillStyle = '#ffffff'; ctx.fillRect(b.x - 1, b.y - 8, 2, 4); ctx.shadowBlur = 0;
    });

    if (gameState === 'playing') {
      ctx.save(); ctx.translate(player.x, player.y);
      const hpRatio = player.hp / player.maxHp;
      let hullColor = '#00d4ff', glowColor = '#00aaff';
      if (hpRatio < 0.25) { hullColor = '#ff4444'; glowColor = '#ff0000'; }
      else if (hpRatio < 0.5) { hullColor = '#ffaa00'; glowColor = '#ff8800'; }
      if (player.invincible > 0 && Math.floor(player.invincible) % 4 < 2) ctx.globalAlpha = 0.4;
      ctx.shadowColor = glowColor; ctx.shadowBlur = 20;
      const engineFlicker = hpRatio < 0.3 ? Math.random() * 10 : 0;
      const engineLen = 8 + Math.random() * 6 + engineFlicker;
      ctx.fillStyle = '#00aaff'; ctx.beginPath(); ctx.moveTo(-6, 14); ctx.lineTo(0, 14 + engineLen); ctx.lineTo(6, 14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#66ccff'; ctx.beginPath(); ctx.moveTo(-3, 14); ctx.lineTo(0, 14 + engineLen * 0.6); ctx.lineTo(3, 14); ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowColor = hullColor; ctx.shadowBlur = 15; ctx.fillStyle = hullColor;
      ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(-15, 14); ctx.lineTo(-6, 10); ctx.lineTo(0, 14); ctx.lineTo(6, 10); ctx.lineTo(15, 14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#88eeff'; ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-5, 4); ctx.lineTo(5, 4); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = hullColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-12, 8); ctx.lineTo(-4, -4); ctx.moveTo(12, 8); ctx.lineTo(4, -4); ctx.stroke();
      if (hpRatio < 0.6) {
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        if (hpRatio < 0.5) { ctx.beginPath(); ctx.moveTo(-8, 5); ctx.lineTo(-4, 10); ctx.moveTo(6, 2); ctx.lineTo(10, 8); ctx.stroke(); }
        if (hpRatio < 0.3) { ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-5, 5); ctx.lineTo(-8, 10); ctx.stroke(); ctx.beginPath(); ctx.moveTo(5, -5); ctx.lineTo(8, 0); ctx.stroke(); }
      }
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      if (player.shieldActive) {
        ctx.strokeStyle = `rgba(0, 170, 255, ${0.4 + Math.sin(player.shieldAngle * 3) * 0.2})`; ctx.lineWidth = 2;
        ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 15; ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.stroke();
        for (let i = 0; i < 6; i++) { const a = player.shieldAngle + (i / 6) * Math.PI * 2; ctx.beginPath(); ctx.arc(Math.cos(a) * 28, Math.sin(a) * 28, 3, 0, Math.PI * 2); ctx.fillStyle = '#00aaff'; ctx.fill(); }
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    particles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    floatingTexts.forEach(t => {
      const alpha = t.life / 60;
      ctx.globalAlpha = alpha; ctx.fillStyle = t.color; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center'; ctx.shadowColor = t.color; ctx.shadowBlur = 10;
      ctx.fillText(t.text, t.x, t.y);
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    const hpBarW = 200, hpBarH = 14, hpX = 20, hpY = 20;
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(hpX, hpY, hpBarW, hpBarH);
    const hpRatio = player.hp / player.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#00ff66' : hpRatio > 0.25 ? '#ffaa00' : '#ff4444'; ctx.fillRect(hpX, hpY, hpBarW * hpRatio, hpBarH);
    ctx.strokeStyle = '#334'; ctx.lineWidth = 1; ctx.strokeRect(hpX, hpY, hpBarW, hpBarH);
    ctx.fillStyle = '#fff'; ctx.font = '11px Courier New'; ctx.textAlign = 'center'; ctx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`, hpX + hpBarW / 2, hpY + 11);
    
    // ✨ UPDATED: Display lives in HUD
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'left'; ctx.fillText(`LIVES: ${player.lives}`, hpX, hpY + 30);
    
    ctx.textAlign = 'right'; ctx.font = 'bold 22px Courier New'; ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 10;
    ctx.fillText(`${score.toLocaleString()}`, canvas.width - 20, 35); ctx.shadowBlur = 0;
    if (isBossWave) {
      const bossTime = 10 - Math.floor(bossWaveTimer / 60);
      ctx.fillStyle = '#ff00ff'; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center'; ctx.fillText(`REINFORCEMENTS IN: ${bossTime}s`, canvas.width / 2, 80);
    } else {
      const waveBarW = 220, waveBarH = 12, waveBarX = canvas.width / 2 - waveBarW / 2, waveBarY = 50;
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(waveBarX, waveBarY, waveBarW, waveBarH);
      const waveProgress = waveTimer / WAVE_DURATION;
      ctx.fillStyle = waveProgress > 0.2 ? '#00d4ff' : '#ff4444'; ctx.fillRect(waveBarX, waveBarY, waveBarW * waveProgress, waveBarH);
      ctx.strokeStyle = '#334'; ctx.lineWidth = 1; ctx.strokeRect(waveBarX, waveBarY, waveBarW, waveBarH);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Courier New'; ctx.textAlign = 'center'; ctx.fillText(`WAVE ${wave} - ${Math.ceil(waveTimer / 60)}s`, canvas.width / 2, waveBarY + waveBarH + 15);
    }
    if (player.powerLevel > 1) {
      ctx.textAlign = 'center'; ctx.font = 'bold 14px Courier New'; ctx.fillStyle = '#ffdd00'; ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 8;
      // ✨ UPDATED: Show current power level instead of static text
      ctx.fillText(`POWER LV: ${player.powerLevel}`, canvas.width / 2, canvas.height - 40); ctx.shadowBlur = 0;
    }
  }
  ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

// Initialize properly after DOM is ready
window.addEventListener('load', () => {
  setResolution(1280, 720);
  initStars();
  initGalaxies(); // ✨ NEW: Initialize galaxies
  loadHighScores();
  updateScale();
  gameLoop();
});

window.addEventListener('resize', updateScale);
</script>
</body>
