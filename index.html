<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU Performance Database (2006–2026)</title>
  <meta name="description" content="Search, compare, and analyze 400+ GPUs with live benchmark scores, API support, and performance deltas.">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #10b981;
      --red: #ef4444;
      --text: #f1f5f9;
      --dim: #94a3b8;
      --api-bg: #1e293b;
      --api-border: #475569;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #059669;
      --red: #dc2626;
      --text: #0f172a;
      --dim: #64748b;
      --api-bg: #f1f5f9;
      --api-border: #cbd5e1;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 40px;
      transition: background 0.3s, color 0.3s;
    }
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      padding: 20px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow);
      display: flex; justify-content: space-between; align-items: center;
    }
    [data-theme="light"] .header { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); }
    .header h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 5px; }
    .header p { color: var(--dim); font-size: 0.9rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .controls {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
      position: relative;
      box-shadow: var(--shadow);
    }
    .search-row { display: flex; gap: 10px; margin-bottom: 15px; position: relative; z-index: 10; }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: var(--bg); color: var(--dim); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); border-color: var(--dim); }
    
    .suggestions-box {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 5px;
      box-shadow: var(--shadow);
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 200;
    }
    .suggestions-box.active { display: block; }
    .suggestion-item {
      padding: 10px 15px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
    .suggestion-meta { font-size: 0.8rem; color: var(--dim); }
    
    .results-header {
      display: flex; justify-content: space-between; align-items: center;
      margin: 20px 0 10px; padding: 0 5px;
    }
    .results-header h2 { font-size: 1.2rem; color: var(--text); }
    .results-header span { color: var(--dim); font-size: 0.9rem; }
    
    .gpu-list { display: flex; flex-direction: column; gap: 8px; }
    .gpu-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 40px 1.5fr 1fr 1fr 80px;
      align-items: center;
      gap: 15px;
      transition: all 0.2s;
      cursor: pointer;
      --brand-color: var(--dim); /* Fallback */
    }
    .gpu-card:hover { border-color: var(--brand-color); transform: translateX(4px); }
    
    /* Dynamic Brand Colors */
    .gpu-card[data-brand="nvidia"] { --brand-color: var(--green); }
    .gpu-card[data-brand="amd"] { --brand-color: var(--red); }
    .gpu-card[data-brand="intel"] { --brand-color: var(--accent); }
    
    .gpu-card.base-card { border-left: 4px solid var(--brand-color); background: color-mix(in srgb, var(--brand-color) 5%, var(--bg)); }
    .gpu-card.faster { border-left: 4px solid var(--brand-color); }
    .gpu-card.slower { border-left: 4px solid var(--brand-color); }
    
    .rank { font-weight: 700; color: var(--dim); text-align: center; }
    .rank.top3 { color: var(--brand-color); }
    
    .gpu-name h3 { font-size: 1rem; color: var(--text); margin-bottom: 2px; }
    .gpu-name .meta { font-size: 0.75rem; color: var(--dim); margin-bottom: 4px; }
    .api-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .api-badge {
      font-size: 0.65rem; padding: 1px 5px; border-radius: 4px;
      background: var(--api-bg); border: 1px solid var(--api-border); color: var(--dim);
    }
    
    .gpu-score { text-align: right; }
    .gpu-score .val { font-size: 1.1rem; font-weight: 700; color: var(--brand-color); }
    .gpu-score .label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; }
    
    .gpu-diff { text-align: right; }
    .gpu-diff .val { font-size: 0.95rem; font-weight: 600; }
    .gpu-diff .label { font-size: 0.7rem; color: var(--dim); }
    .gpu-diff.positive .val { color: var(--green); }
    .gpu-diff.negative .val { color: var(--red); }
    
    .gpu-specs { text-align: right; font-size: 0.8rem; color: var(--dim); }
    .gpu-specs span { display: block; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--card); padding: 25px; border-radius: 12px;
      max-width: 700px; width: 95%; max-height: 90vh; overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .close-btn { background: none; border: none; color: var(--dim); font-size: 1.5rem; cursor: pointer; }
    
    .compare-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;
      padding: 15px; background: var(--bg); border-radius: 8px;
    }
    .compare-item h4 { color: var(--accent); margin-bottom: 10px; font-size: 1.1rem; }
    .compare-item p { font-size: 0.9rem; margin: 5px 0; color: var(--dim); }
    .compare-item strong { color: var(--text); }
    
    .api-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 8px;
    }
    .api-item { text-align: center; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
    .api-item .api-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; margin-bottom: 4px; }
    .api-item .api-val { font-size: 0.9rem; font-weight: 600; color: var(--accent); }
    
    .scrape-status {
      margin-top: 15px; padding: 10px; border-radius: 6px;
      font-size: 0.9rem; display: none;
    }
    .scrape-status.loading { background: rgba(59,130,246,0.1); color: var(--accent); display: block; }
    .scrape-status.done { background: rgba(16,185,129,0.1); color: var(--green); display: block; }
    .scrape-status.error { background: rgba(239,68,68,0.1); color: var(--red); display: block; }

    .filter-btns { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 12px; border-radius: 20px; background: var(--bg);
      border: 1px solid var(--border); color: var(--dim); cursor: pointer; font-size: 0.8rem;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); }
    
    .theme-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }
    .theme-toggle:hover { background: var(--border); }
    
    .base-label { color: var(--accent); font-size: 0.8rem; }
    .diff-faster { color: var(--green); }
    .diff-slower { color: var(--red); }
    .hidden { display: none !important; }
    
    .loading-skeleton {
      height: 60px; background: var(--border); border-radius: 8px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* 🎮 GAMES FEATURE STYLES */
    .btn-games {
      background: var(--brand-color);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
      grid-column: 1 / -1;
      justify-self: center;
    }
    .btn-games:hover { background: var(--accent-hover); transform: scale(1.05); }

    /* Games Modal Specifics */
    .game-tabs {
      display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .game-tab {
      background: transparent; border: none; color: var(--dim); font-weight: 600;
      padding: 8px 16px; cursor: pointer; border-radius: 6px; transition: all 0.2s;
    }
    .game-tab:hover { color: var(--text); background: var(--border); }
    .game-tab.active { background: var(--accent); color: white; }

    .game-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .game-card:hover { border-color: var(--accent); transform: translateX(4px); }
    .game-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .game-card h4 { color: var(--accent); font-size: 1.1rem; margin: 0; }
    .game-card p { font-size: 0.85rem; color: var(--dim); margin: 4px 0; }
    .game-card .score-range { color: var(--text); font-weight: 600; }
    
    .game-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .tag {
      font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
      background: var(--card); border: 1px solid var(--border); color: var(--dim);
    }
    .tag.api { border-color: var(--accent); color: var(--accent); }
    .tag.vram { border-color: var(--green); color: var(--green); }
    .tag.score { border-color: var(--red); color: var(--red); }

    .compat-badge {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 700; margin-top: 6px;
    }
    .compat-badge.yes { background: rgba(16,185,129,0.2); color: var(--green); }
    .compat-badge.rec { background: rgba(59,130,246,0.2); color: var(--accent); }
    
    @media (max-width: 768px) {
      .gpu-card { grid-template-columns: 30px 1fr auto; grid-template-rows: auto auto; }
      .gpu-specs, .gpu-diff { display: none; }
      .gpu-score { grid-row: 2; grid-column: 2; text-align: left; margin-top: 5px; }
      .api-grid { grid-template-columns: 1fr 1fr; }
      .compare-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚡ GPU Performance Database</h1>
    <p>Search 400+ GPUs (2006–2026) • Compare scores • Filter by brand</p>
  </div>
  <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌙</button>
</div>

<div class="container">
  <div class="controls">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search GPU (e.g., RTX 4090, RX 6800, 4090)..." autocomplete="off">
      <button class="btn btn-primary" onclick="searchGPU()">🔍 Search</button>
      <button class="btn btn-secondary" onclick="clearSearch()">✕ Clear</button>
    </div>
    <div id="suggestionsBox" class="suggestions-box"></div>
    
    <div class="filter-btns">
      <button class="filter-btn active" onclick="filterList('all', this)">All</button>
      <button class="filter-btn" onclick="filterList('nvidia', this)">NVIDIA</button>
      <button class="filter-btn" onclick="filterList('amd', this)">AMD</button>
      <button class="filter-btn" onclick="filterList('intel', this)">Intel</button>
      <button class="filter-btn" onclick="filterList('igpu', this)">iGPUs</button>
    </div>
  </div>

  <div id="statusBar" class="scrape-status"></div>

  <div id="resultsSection" class="hidden">
    <div class="results-header">
      <h2 id="resultsTitle">Search Results</h2>
      <span id="resultsCount"></span>
    </div>
    <div class="gpu-list" id="gpuList"></div>
  </div>

  <div id="comparisonModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚖️ GPU Comparison</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div id="compareContent"></div>
    </div>
  </div>

  <!-- 🎮 GAMES MODAL -->
  <div id="gamesModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h2 id="gamesModalTitle">🎮 Compatible Games</h2>
        <button class="close-btn" onclick="closeGamesModal()">&times;</button>
      </div>
      
      <!-- Tabs -->
      <div class="game-tabs" id="gameTabs">
        <button class="game-tab active" onclick="filterGamesByTab('all')">All Games</button>
        <button class="game-tab" onclick="filterGamesByTab('12')">DX12</button>
        <button class="game-tab" onclick="filterGamesByTab('11')">DX11</button>
        <button class="game-tab" onclick="filterGamesByTab('9')">DX9/10</button>
      </div>

      <div id="gamesModalContent">
        <p style="text-align:center; color:var(--dim); padding: 20px;">Loading games...</p>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CORE STATE
// ============================================================
let currentFilter = 'all';
let lastSearch = null;
let GPU_DB = [];
let GAMES_DB = [];
let isLoading = false;
let currentGameTab = 'all';

// ============================================================
// INIT & THEME
// ============================================================
function init() {
  setupTheme();
  setupSuggestions();
  loadDatabase();
}

function setupTheme() {
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('gpu-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'dark' ? '🌙' : '☀️';
  
  toggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('gpu-theme', next);
    toggle.textContent = next === 'dark' ? '🌙' : '☀️';
  });
}

// ============================================================
// DATABASE LOADING
// ============================================================
async function loadDatabase() {
  showStatus('Loading GPU database...', 'loading');
  try {
    const [gpuRes, gameRes] = await Promise.all([
      fetch('gpus.json'),
      fetch('./games.json').catch(() => Promise.resolve(null))
    ]);
    
    if (!gpuRes.ok) throw new Error('Failed to load gpus.json');
    GPU_DB.push(...await gpuRes.json());
    
    if (gameRes && gameRes.ok) {
      GAMES_DB = await gameRes.json();
      console.log(`✅ Successfully loaded ${GAMES_DB.length} games from games.json`);
    } else {
      console.warn('⚠️ games.json not found or empty. Using fallback sample data.');
      GAMES_DB = [
        {title:"Cyberpunk 2077", api:12, min_score:15000, recommended_score:35000, min_vram_mb:6144, min_year:2018, notes:"Heavy DX12/Vulkan title."},
        {title:"Elden Ring", api:12, min_score:12000, recommended_score:25000, min_vram_mb:4096, min_year:2021, notes:"DX12 required."},
        {title:"Fortnite", api:12, min_score:3000, recommended_score:10000, min_vram_mb:2048, min_year:2017, notes:"Highly scalable."}
      ];
    }
    finalizeInit();
  } catch (err) {
    console.warn('Fallback dataset loaded due to error.', err);
    GPU_DB.push(
      {name:"RTX 4090",brand:"nvidia",type:"dGPU",year:2022,score:78500,vram:"24GB GDDR6X",tdp:450,arch:"Ada Lovelace"},
      {name:"RX 7900 XTX",brand:"amd",type:"dGPU",year:2022,score:52000,vram:"24GB GDDR6",tdp:355,arch:"RDNA 3"},
      {name:"Core Ultra 9 288V",brand:"intel",type:"igpu",year:2024,score:12000,vram:"Shared",tdp:35,arch:"Xe2"},
      {name:"GTX 1080 Ti",brand:"nvidia",type:"dGPU",year:2017,score:24000,vram:"11GB GDDR5X",tdp:250,arch:"Pascal"},
      {name:"RX 580 8GB",brand:"amd",type:"dGPU",year:2017,score:10000,vram:"8GB GDDR5",tdp:185,arch:"GCN 5"}
    );
    finalizeInit();
  }
}

function finalizeInit() {
  GPU_DB.forEach(gpu => {
    const y = gpu.year;
    gpu.dx_hw = y < 2006 ? "DX8.1" : y < 2009 ? "DX9.0c" : y < 2012 ? "DX10.1" : y < 2015 ? "DX11" : y < 2020 ? "DX12" : y < 2024 ? "DX12_1" : "DX12_2";
    gpu.dx_sw = y < 2006 ? "SM 2.0" : y < 2009 ? "SM 3.0" : y < 2012 ? "SM 4.1" : y < 2015 ? "SM 5.0" : y < 2020 ? "SM 5.1" : y < 2024 ? "SM 6.3" : "SM 6.7";
    gpu.vulkan = y < 2016 ? "N/A" : y < 2019 ? "1.0" : y < 2021 ? "1.1" : y < 2023 ? "1.2" : "1.3";
    gpu.opengl = y < 2006 ? "2.0" : y < 2009 ? "2.1" : y < 2012 ? "3.0" : y < 2015 ? "3.3" : y < 2018 ? "4.1" : y < 2020 ? "4.5" : "4.6 (DRM)";
  });
  renderList(GPU_DB);
  showStatus('Database loaded successfully.', 'done');
}

// ============================================================
// SEARCH & SUGGESTIONS
// ============================================================
function setupSuggestions() {
  const input = document.getElementById('searchInput');
  const box = document.getElementById('suggestionsBox');
  let timeout;

  input.addEventListener('input', function() {
    clearTimeout(timeout);
    const query = this.value.trim().toLowerCase();
    box.innerHTML = '';
    if (query.length < 1) { box.classList.remove('active'); return; }

    timeout = setTimeout(() => {
      const matches = GPU_DB.filter(gpu => {
        const nameMatch = gpu.name.toLowerCase().includes(query);
        const archMatch = gpu.arch.toLowerCase().includes(query);
        const yearMatch = gpu.year.toString().includes(query);
        return nameMatch || archMatch || yearMatch;
      }).slice(0, 10);

      if (matches.length > 0) {
        matches.forEach(match => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.innerHTML = `<span>${match.name}</span><span class="suggestion-meta">${match.arch} • ${match.year}</span>`;
          div.onclick = () => {
            input.value = match.name;
            box.classList.remove('active');
            searchGPU(match);
          };
          box.appendChild(div);
        });
        box.classList.add('active');
      } else {
        box.classList.remove('active');
      }
    }, 150);
  });

  document.addEventListener('click', function(e) {
    if (e.target !== input) box.classList.remove('active');
  });
  
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      searchGPU();
      box.classList.remove('active');
    }
  });
}

function searchGPU(specificMatch = null) {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query && !specificMatch) { clearSearch(); return; }

  let baseCard = specificMatch;
  if (!baseCard) {
    baseCard = GPU_DB.find(g => g.name.toLowerCase() === query) || GPU_DB.find(g => g.name.toLowerCase().includes(query));
    if (baseCard) document.getElementById('searchInput').value = baseCard.name;
    if (!baseCard) { showStatus('No GPU found matching that name.', 'error'); return; }
  }

  lastSearch = baseCard;
  showSimilarCards(baseCard);
}

// ============================================================
// RENDERING
// ============================================================
function showSimilarCards(baseCard) {
  const resultsSection = document.getElementById('resultsSection');
  const resultsTitle = document.getElementById('resultsTitle');
  const resultsCount = document.getElementById('resultsCount');
  const gpuList = document.getElementById('gpuList');

  let similar = GPU_DB
    .map(gpu => {
      const diff = gpu.score - baseCard.score;
      const pctDiff = ((diff / baseCard.score) * 100).toFixed(1);
      return { ...gpu, diff, pctDiff, isBase: gpu.name === baseCard.name };
    })
    .sort((a, b) => a.diff - b.diff);

  const filtered = similar.filter(g => !g.isBase);
  const faster = filtered.filter(g => g.diff < 0).sort((a, b) => b.diff - a.diff).slice(0, 7);
  const slower = filtered.filter(g => g.diff > 0).sort((a, b) => a.diff - b.diff).slice(0, 8);
  const finalList = [...faster, baseCard, ...slower];

  resultsSection.classList.remove('hidden');
  resultsTitle.textContent = `Similar to: ${baseCard.name}`;
  resultsCount.textContent = `${finalList.length} cards shown`;

  gpuList.innerHTML = finalList.map((gpu, i) => {
    const isBase = gpu.isBase;
    const isFaster = gpu.diff > 0;
    const isSlower = gpu.diff < 0;
    const cardClass = isBase ? 'base-card' : (isFaster ? 'faster' : 'slower');
    const diffClass = isFaster ? 'positive' : 'negative';
    const diffIcon = isFaster ? '+' : '';
    const rankClass = i < 3 ? 'top3' : '';

    return `
      <div class="gpu-card ${cardClass}" data-brand="${gpu.brand}" data-card1='${JSON.stringify(baseCard).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
        <div class="rank ${rankClass}">${i + 1}</div>
        <div class="gpu-name">
          <h3>${gpu.name} ${isBase ? '<span class="base-label">(BASE)</span>' : ''}</h3>
          <div class="meta">${gpu.arch} • ${gpu.year} • ${gpu.vram}</div>
          <div class="api-badges">
            <span class="api-badge">DX:${gpu.dx_hw}</span>
            <span class="api-badge">VK:${gpu.vulkan}</span>
            <span class="api-badge">GL:${gpu.opengl}</span>
          </div>
        </div>
        <div class="gpu-score">
          <div class="val">${gpu.score.toLocaleString()}</div>
          <div class="label">Score</div>
        </div>
        <div class="gpu-diff ${diffClass}">
          <div class="val">${diffIcon}${gpu.pctDiff}%</div>
          <div class="label">Diff</div>
        </div>
        <div class="gpu-specs">
          <span>${gpu.tdp}W</span>
          <span>${gpu.brand.toUpperCase()}</span>
        </div>
        <button class="btn-games" onclick="event.stopPropagation(); openGamesModal('${gpu.name}')">🎮 Compatible Games</button>
      </div>
    `;
  }).join('');

  showStatus(`Found 15 cards with similar performance to ${baseCard.name}. Click a card to compare.`, 'done');
}

function renderList(gpus) {
  const container = document.getElementById('gpuList');
  const sortedGpus = [...gpus].sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.name.localeCompare(b.name);
  });

  container.innerHTML = sortedGpus.slice(0, 300).map((gpu, i) => `
    <div class="gpu-card" data-brand="${gpu.brand}" data-card1='${JSON.stringify(lastSearch || gpus[0]).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
      <div class="rank">${i + 1}</div>
      <div class="gpu-name">
        <h3>${gpu.name}</h3>
        <div class="meta">${gpu.arch} • ${gpu.year} • ${gpu.vram}</div>
        <div class="api-badges">
          <span class="api-badge">DX:${gpu.dx_hw}</span>
          <span class="api-badge">VK:${gpu.vulkan}</span>
          <span class="api-badge">GL:${gpu.opengl}</span>
        </div>
      </div>
      <div class="gpu-score">
        <div class="val">${gpu.score.toLocaleString()}</div>
        <div class="label">Score</div>
      </div>
      <div class="gpu-specs">
        <span>${gpu.tdp}W</span>
        <span>${gpu.brand.toUpperCase()}</span>
      </div>
      <button class="btn-games" onclick="event.stopPropagation(); openGamesModal('${gpu.name}')">🎮 Compatible Games</button>
    </div>
  `).join('');
  
  document.getElementById('resultsSection').classList.remove('hidden');
  document.getElementById('resultsTitle').textContent = filterLabel(currentFilter);
  document.getElementById('resultsCount').textContent = `${gpus.length} cards found`;
}

// ============================================================
// GAMES COMPATIBILITY LOGIC
// ============================================================
function supportsAPI(gpu, apiLevel) {
  if (apiLevel === 12) return gpu.year >= 2015;
  if (apiLevel === 11) return gpu.year >= 2009;
  if (apiLevel === 10) return gpu.year >= 2006;
  if (apiLevel === 9) return true;
  return false;
}

function getGameCompatibility(gpu, game) {
  if (gpu.year < game.min_year) return 'no';
  if (!supportsAPI(gpu, game.api)) return 'no';
  const gpuVramMB = gpu.vram === "Shared" ? 2048 : parseInt(gpu.vram) * 1024;
  if (gpuVramMB < game.min_vram_mb) return 'no';
  if (gpu.score >= game.recommended_score) return 'recommended';
  if (gpu.score >= game.min_score) return 'compatible';
  return 'no';
}

function openGamesModal(gpuName) {
  const gpu = GPU_DB.find(g => g.name === gpuName);
  if (!gpu) return;

  const compatibleGames = GAMES_DB
    .map(game => ({ ...game, status: getGameCompatibility(gpu, game) }))
    .filter(g => g.status !== 'no')
    // Sort newest to oldest by year, then alphabetically if years match
    .sort((a, b) => b.min_year - a.min_year || a.title.localeCompare(b.title));

  const modal = document.getElementById('gamesModal');
  const content = document.getElementById('gamesModalContent');
  const title = document.getElementById('gamesModalTitle');
  
  title.textContent = `🎮 Compatible Games for ${gpu.name}`;
  
  currentGameTab = 'all';
  document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.game-tab').classList.add('active');

  renderGameList(compatibleGames);
  modal.classList.add('active');
}

function renderGameList(games) {
  const content = document.getElementById('gamesModalContent');
  
  if (games.length === 0) {
    content.innerHTML = `<p style="text-align:center; color:var(--dim); padding:20px;">No compatible games found in database for this GPU.</p>`;
    return;
  }

  content.innerHTML = games.map(game => {
    let badgeClass = game.status === 'recommended' ? 'rec' : 'yes';
    let badgeText = game.status === 'recommended' ? '✅ Recommended' : '✔️ Compatible';
    const vramGB = game.min_vram_mb / 1024;
    
    return `
      <div class="game-card">
        <div class="game-card-header">
          <h4>${game.title}</h4>
          <span class="compat-badge ${badgeClass}">${badgeText}</span>
        </div>
        <p><span class="score-range">Min Score:</span> ${game.min_score.toLocaleString()} | <span class="score-range">Rec:</span> ${game.recommended_score.toLocaleString()}</p>
        <div class="game-tags">
          <span class="tag api">DX ${game.api}</span>
          <span class="tag vram">Min ${vramGB}GB VRAM</span>
          <span class="tag score">Min Score ${game.min_score}</span>
          <span class="tag">Year: ${game.min_year}</span>
        </div>
        <p style="margin-top:8px;"><em>${game.notes}</em></p>
      </div>
    `;
  }).join('');
}

function filterGamesByTab(apiLevel) {
  document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
  const buttons = document.querySelectorAll('.game-tab');
  if(apiLevel === 'all') buttons[0].classList.add('active');
  if(apiLevel === '12') buttons[1].classList.add('active');
  if(apiLevel === '11') buttons[2].classList.add('active');
  if(apiLevel === '9') buttons[3].classList.add('active');

  currentGameTab = apiLevel;
  const modal = document.getElementById('gamesModal');
  const fullList = modal.dataset.fullList ? JSON.parse(modal.dataset.fullList) : [];
  
  if (apiLevel === 'all') {
    renderGameList(fullList);
  } else {
    const filtered = fullList.filter(g => g.api == apiLevel);
    renderGameList(filtered);
  }
}

// Store full list on modal open for tab filtering
const originalOpenGamesModal = openGamesModal;
openGamesModal = function(gpuName) {
  const gpu = GPU_DB.find(g => g.name === gpuName);
  if (!gpu) return;

  const compatibleGames = GAMES_DB
    .map(game => ({ ...game, status: getGameCompatibility(gpu, game) }))
    .filter(g => g.status !== 'no')
    .sort((a, b) => b.min_year - a.min_year || a.title.localeCompare(b.title));

  document.getElementById('gamesModal').dataset.fullList = JSON.stringify(compatibleGames);
  
  const modal = document.getElementById('gamesModal');
  const content = document.getElementById('gamesModalContent');
  const title = document.getElementById('gamesModalTitle');
  
  title.textContent = `🎮 Compatible Games for ${gpu.name}`;
  
  currentGameTab = 'all';
  document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.game-tab').classList.add('active');

  renderGameList(compatibleGames);
  modal.classList.add('active');
}

function closeGamesModal() {
  document.getElementById('gamesModal').classList.remove('active');
}

document.getElementById('gamesModal')?.addEventListener('click', (e) => {
  if (e.target.id === 'gamesModal') closeGamesModal();
});

// ============================================================
// COMPARISON MODAL
// ============================================================
function showComparison(card1, card2) {
  const modal = document.getElementById('comparisonModal');
  const content = document.getElementById('compareContent');
  
  const pctDiff = ((card2.score - card1.score) / card1.score * 100).toFixed(1);
  const faster = card2.score > card1.score;
  const diffClass = faster ? 'diff-faster' : 'diff-slower';
  const diffIcon = faster ? '+' : '';

  const renderAPI = (gpu) => `
    <div class="api-grid">
      <div class="api-item"><div class="api-label">DX HW</div><div class="api-val">${gpu.dx_hw || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">DX SW</div><div class="api-val">${gpu.dx_sw || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">Vulkan</div><div class="api-val">${gpu.vulkan || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">OpenGL</div><div class="api-val">${gpu.opengl || 'N/A'}</div></div>
    </div>
  `;

  content.innerHTML = `
    <div class="compare-row">
      <div class="compare-item">
        <h4>${card1.name}</h4>
        <p><strong>Score:</strong> ${card1.score.toLocaleString()}</p>
        <p><strong>Architecture:</strong> ${card1.arch}</p>
        <p><strong>VRAM:</strong> ${card1.vram}</p>
        <p><strong>TDP:</strong> ${card1.tdp}W</p>
        <p><strong>Year:</strong> ${card1.year}</p>
        ${renderAPI(card1)}
      </div>
      <div class="compare-item">
        <h4>${card2.name}</h4>
        <p><strong>Score:</strong> ${card2.score.toLocaleString()}</p>
        <p><strong>Architecture:</strong> ${card2.arch}</p>
        <p><strong>VRAM:</strong> ${card2.vram}</p>
        <p><strong>TDP:</strong> ${card2.tdp}W</p>
        <p><strong>Year:</strong> ${card2.year}</p>
        ${renderAPI(card2)}
      </div>
    </div>
    <div style="text-align:center; margin-top:20px;">
      <p style="font-size:1.2rem; color:var(--dim);">
        ${card2.name} is <strong class="${diffClass}" style="font-size:1.4rem;">${diffIcon}${pctDiff}%</strong> 
        ${faster ? 'faster' : 'slower'} than ${card1.name}
      </p>
    </div>
  `;
  
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('comparisonModal').classList.remove('active');
}

// ============================================================
// UTILITIES
// ============================================================
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultsSection').classList.add('hidden');
  document.getElementById('statusBar').style.display = 'none';
  document.getElementById('suggestionsBox').classList.remove('active');
  lastSearch = null;
  renderList(GPU_DB);
}

function filterList(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  let filtered = GPU_DB;
  if (filter === 'nvidia') filtered = GPU_DB.filter(g => g.brand === 'nvidia');
  else if (filter === 'amd') filtered = GPU_DB.filter(g => g.brand === 'amd');
  else if (filter === 'intel') filtered = GPU_DB.filter(g => g.brand === 'intel');
  else if (filter === 'igpu') filtered = GPU_DB.filter(g => g.type === 'igpu');
  
  renderList(filtered);
}

function filterLabel(f) {
  if (f === 'all') return 'All GPUs in Database';
  if (f === 'nvidia') return 'NVIDIA GPUs';
  if (f === 'amd') return 'AMD GPUs';
  if (f === 'intel') return 'Intel iGPUs';
  if (f === 'igpu') return 'Integrated GPUs';
  return 'GPUs';
}

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = `scrape-status ${type}`;
  bar.style.display = 'block';
  setTimeout(() => { bar.style.display = 'none'; }, 5000);
}

// Initialize
init();
</script>
