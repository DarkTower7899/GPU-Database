<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU Performance Database (2006–2026)</title>
  <meta name="description" content="Search, compare, and analyze 400+ GPUs with live benchmark scores, API support, and performance deltas.">
  <style>
    /* =========================================
       THEME VARIABLES & RESET (CYBERPUNK EDITION)
       ========================================= */
    :root {
      --bg-body: #05050a;
      --bg-panel: rgba(10, 10, 20, 0.85);
      --bg-card: rgba(15, 15, 30, 0.5);
      --bg-card-hover: rgba(20, 20, 45, 0.7);
      --border-subtle: rgba(0, 243, 255, 0.12);
      --border-focus: rgba(0, 243, 255, 0.6);
      --text-main: #e0e6ff;
      --text-muted: #6b7294;
      --accent-primary: #00f3ff;
      --accent-gradient: linear-gradient(135deg, #00f3ff 0%, #bc13fe 100%);
      
      /* NEON BRAND COLORS */
      --brand-intel: #00f3ff; /* Neon Cyan */
      --brand-nvidia: #39ff14; /* Neon Green */
      --brand-amd: #ff003c;   /* Neon Red/Pink */
      
      --success: #00ff41;
      --danger: #ff003c;
      --shadow-card: 0 0 15px rgba(0, 243, 255, 0.08), 0 4px 6px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 25px rgba(0, 243, 255, 0.2), 0 0 10px rgba(188, 19, 254, 0.15);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --radius-lg: 12px;
      --radius-md: 8px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* FORCE DARK MODE */
    [data-theme="light"] {
      --bg-body: #05050a;
      --bg-panel: rgba(10, 10, 20, 0.85);
      --bg-card: rgba(15, 15, 30, 0.5);
      --bg-card-hover: rgba(20, 20, 45, 0.7);
      --border-subtle: rgba(0, 243, 255, 0.12);
      --border-focus: rgba(0, 243, 255, 0.6);
      --text-main: #e0e6ff;
      --text-muted: #6b7294;
      --accent-primary: #00f3ff;
      --accent-gradient: linear-gradient(135deg, #00f3ff 0%, #bc13fe 100%);
      --brand-intel: #00f3ff;
      --brand-nvidia: #39ff14;
      --brand-amd: #ff003c;
      --success: #00ff41;
      --danger: #ff003c;
      --shadow-card: 0 0 15px rgba(0, 243, 255, 0.08), 0 4px 6px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 25px rgba(0, 243, 255, 0.2), 0 0 10px rgba(188, 19, 254, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-body);
      color: var(--text-main);
      transition: background-color 0.3s ease;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        radial-gradient(circle at 15% 0%, rgba(0, 243, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(188, 19, 254, 0.08) 0%, transparent 40%);
      background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
      background-attachment: fixed;
      line-height: 1.5;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 243, 255, 0.02) 2px,
        rgba(0, 243, 255, 0.02) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 16px 24px;
      gap: 20px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      position: sticky; top: 0; z-index: 100;
    }

    .header-left { justify-self: start; }
    .header-center { 
      justify-self: center; 
      display: flex; 
      justify-content: center; 
      width: 100%;
      max-width: 480px;
    }
    .header-right { justify-self: end; display: flex; gap: 10px; align-items: center; }

    .header-content h1 {
      font-size: clamp(0.85rem, 1.3vw, 1.15rem);
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      filter: drop-shadow(0 0 8px rgba(0, 243, 255, 0.4));
    }
    .header-content p { color: var(--text-muted); font-size: 0.8rem; }

    .craptop-link {
      display: inline-flex; align-items: center;
      padding: 6px 8px; border-radius: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border-subtle);
      transition: all 0.2s ease; text-decoration: none;
    }
    [data-theme="light"] .craptop-link { background: rgba(0,0,0,0.04); }
    .craptop-link:hover { 
      border-color: var(--accent-primary); transform: scale(1.03);
      box-shadow: 0 4px 12px rgba(0, 243, 255, 0.2);
    }
    .craptop-link img {
      height: 90px; width: auto; max-width: 420px;
      border-radius: 10px; display: block; object-fit: contain;
      transition: transform 0.2s ease;
    }
    .craptop-link:hover img { transform: scale(1.02); }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .control-panel {
      background: var(--bg-panel); backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
      padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow-card);
    }

    .search-row { display: flex; gap: 12px; margin-bottom: 16px; position: relative; }

    .input-wrapper { flex: 1; position: relative; }

    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }

    input[type="text"] {
      width: 100%; padding: 14px 14px 14px 42px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); color: var(--text-main);
      font-size: 1rem; transition: var(--transition); font-family: inherit;
    }
    [data-theme="light"] input[type="text"] { background: rgba(255,255,255,0.5); }
    input[type="text"]:focus {
      outline: none; border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(0, 243, 255, 0.2), 0 0 15px rgba(0, 243, 255, 0.3);
    }

    .suggestions-box {
      position: fixed;
      z-index: 10000;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      display: none;
      overflow-y: auto;
      max-height: 320px;
      width: 100%;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .suggestions-box.active { display: block; }
    
    .suggestion-item {
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; justify-content: space-between;
      font-size: 0.9rem; color: var(--text-main);
      transition: background 0.15s; user-select: none;
    }
    .suggestion-item:hover { background: rgba(0, 243, 255, 0.15); color: var(--accent-primary); }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-meta { color: var(--text-muted); font-size: 0.8rem; }

    .btn {
      padding: 0 24px; height: 48px; border: none; border-radius: var(--radius-md);
      cursor: pointer; font-weight: 600; font-size: 0.95rem;
      transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: var(--accent-gradient); color: white;
      box-shadow: 0 4px 15px rgba(0, 243, 255, 0.4);
      border: 1px solid rgba(0, 243, 255, 0.3);
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.2); box-shadow: 0 6px 20px rgba(0, 243, 255, 0.6); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    .btn-secondary {
      background: transparent; border: 1px solid var(--border-subtle); color: var(--text-muted);
    }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text-main); }

    .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px; background: transparent;
      border: 1px solid var(--border-subtle); color: var(--text-muted);
      cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: var(--transition);
    }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text-main); }
    .filter-btn.active {
      background: rgba(0, 243, 255, 0.1); border-color: var(--accent-primary); color: var(--accent-primary);
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
    }

    .results-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 24px 0 16px; padding: 0 4px;
    }
    .results-header h2 { font-size: 1.25rem; font-weight: 600; color: var(--accent-primary); text-shadow: 0 0 8px rgba(0, 243, 255, 0.3); }
    .results-header span { color: var(--text-muted); font-size: 0.9rem; }

    .gpu-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .gpu-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 16px; display: grid;
      grid-template-columns: 1fr; gap: 12px; transition: var(--transition);
      cursor: pointer; position: relative; overflow: hidden; width: 100%;
    }
    .gpu-card:hover {
      border-color: var(--accent-primary); background: var(--bg-card-hover);
      transform: translateY(-2px); box-shadow: var(--shadow-glow), inset 0 0 15px rgba(0, 243, 255, 0.05);
    }
    .gpu-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--border-subtle);
      box-shadow: 2px 0 8px var(--border-subtle);
    }
    .gpu-card.base-card::before { background: var(--accent-primary); box-shadow: 0 0 12px var(--accent-primary); }
    .gpu-card.faster::before { background: var(--success); box-shadow: 0 0 12px var(--success); }
    .gpu-card.slower::before { background: var(--danger); box-shadow: 0 0 12px var(--danger); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .gpu-rank {
      font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
      background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px;
    }
    .gpu-rank.top3 { color: var(--accent-primary); background: rgba(0, 243, 255, 0.1); }

    .gpu-name h3 { font-size: 1.05rem; margin-bottom: 2px; line-height: 1.3; text-shadow: 0 0 5px rgba(255,255,255,0.1); }
    .gpu-name .base-label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--accent-primary); font-weight: 700; margin-left: 6px;
    }
    .gpu-meta {
      font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap;
    }
    .gpu-meta span::after { content: '•'; margin-left: 6px; color: var(--border-subtle); }
    .gpu-meta span:last-child::after { content: ''; }

    .gpu-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .api-badge {
      font-size: 0.7rem; padding: 2px 6px; border-radius: 4px;
      background: rgba(0, 243, 255, 0.05); border: 1px solid var(--border-subtle);
      color: var(--text-muted); font-family: monospace;
      text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
    }

    .card-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-subtle);
    }
    .gpu-score { text-align: right; }
    .gpu-score .val { font-size: 1.1rem; font-weight: 700; color: var(--accent-primary); text-shadow: 0 0 8px rgba(0, 243, 255, 0.4); }
    .gpu-score .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .gpu-diff { text-align: right; }
    .gpu-diff .val { font-size: 0.9rem; font-weight: 600; }
    .gpu-diff.positive .val { color: var(--success); text-shadow: 0 0 6px var(--success); }
    .gpu-diff.negative .val { color: var(--danger); text-shadow: 0 0 6px var(--danger); }
    
    .gpu-specs { font-size: 0.8rem; color: var(--text-muted); text-align: right; }
    .gpu-specs span { display: block; }

    /* NEON BRAND OVERRIDES */
    .gpu-card.brand-intel::before { background: var(--brand-intel) !important; box-shadow: 0 0 15px var(--brand-intel) !important; }
    .gpu-card.brand-intel .gpu-score .val { color: var(--brand-intel); text-shadow: 0 0 8px var(--brand-intel); }
    .gpu-card.brand-intel .gpu-rank { color: var(--brand-intel); background: rgba(0, 243, 255, 0.1); }

    .gpu-card.brand-nvidia::before { background: var(--brand-nvidia) !important; box-shadow: 0 0 15px var(--brand-nvidia) !important; }
    .gpu-card.brand-nvidia .gpu-score .val { color: var(--brand-nvidia); text-shadow: 0 0 8px var(--brand-nvidia); }
    .gpu-card.brand-nvidia .gpu-rank { color: var(--brand-nvidia); background: rgba(57, 255, 20, 0.1); }

    .gpu-card.brand-amd::before { background: var(--brand-amd) !important; box-shadow: 0 0 15px var(--brand-amd) !important; }
    .gpu-card.brand-amd .gpu-score .val { color: var(--brand-amd); text-shadow: 0 0 8px var(--brand-amd); }
    .gpu-card.brand-amd .gpu-rank { color: var(--brand-amd); background: rgba(255, 0, 60, 0.1); }

    /* =========================================
       GAME CARD STYLES (Cyberpunk Updated)
       ========================================= */
    .game-card-list {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 16px; display: grid;
      grid-template-columns: 1fr; gap: 12px; transition: var(--transition);
      cursor: pointer; position: relative; overflow: hidden; width: 100%;
    }
    .game-card-list:hover {
      border-color: var(--accent-primary); background: var(--bg-card-hover);
      transform: translateY(-2px); box-shadow: var(--shadow-glow), inset 0 0 15px rgba(0, 243, 255, 0.05);
    }
    .game-card-list::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--accent-primary);
      box-shadow: 2px 0 10px var(--accent-primary);
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
      z-index: 200; justify-content: center; align-items: center; padding: 20px;
    }
    .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-content {
      background: var(--bg-panel); border: 1px solid var(--border-subtle);
      padding: 0; border-radius: var(--radius-lg); max-width: 800px; width: 100%;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 0 40px rgba(0, 243, 255, 0.15), 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border-subtle);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: rgba(10, 10, 20, 0.95); z-index: 10;
    }
    [data-theme="light"] .modal-header { background: rgba(15, 15, 30, 0.95); }
    .modal-header h2 { font-size: 1.2rem; font-weight: 700; color: var(--accent-primary); text-shadow: 0 0 8px rgba(0, 243, 255, 0.3); }
    .close-btn {
      background: transparent; border: none; color: var(--text-muted);
      font-size: 1.5rem; cursor: pointer; padding: 4px; line-height: 1;
    }
    .close-btn:hover { color: var(--text-main); }
    .modal-body { padding: 24px; }

    .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .compare-item {
      background: rgba(0, 243, 255, 0.03); border-radius: var(--radius-md);
      padding: 16px; border: 1px solid var(--border-subtle);
    }
    .compare-item h4 { 
      color: var(--accent-primary); margin-bottom: 12px; font-size: 1.1rem; 
      border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;
      text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
    }
    .compare-item p { font-size: 0.9rem; margin: 8px 0; color: var(--text-muted); }
    .compare-item strong { color: var(--text-main); }

    .api-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
      margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-subtle);
    }
    .api-item { text-align: center; padding: 6px; background: rgba(0,0,0,0.2); border-radius: 4px; }
    [data-theme="light"] .api-item { background: rgba(0,0,0,0.03); }
    .api-item .api-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
    .api-item .api-val { font-size: 0.85rem; font-weight: 600; color: var(--accent-primary); text-shadow: 0 0 5px rgba(0, 243, 255, 0.3); }

    .comparison-verdict {
      text-align: center; padding: 16px; background: rgba(0, 243, 255, 0.05);
      border-radius: var(--radius-md); border: 1px solid rgba(0, 243, 255, 0.2);
      box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05);
    }
    .diff-faster { color: var(--success); text-shadow: 0 0 10px var(--success); }
    .diff-slower { color: var(--danger); text-shadow: 0 0 10px var(--danger); }

    .theme-toggle {
      background: var(--bg-panel); border: 1px solid var(--border-subtle);
      color: var(--text-main); padding: 8px 12px; border-radius: var(--radius-md);
      cursor: pointer; font-size: 1.1rem; transition: var(--transition);
    }
    .theme-toggle:hover { border-color: var(--accent-primary); box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }

    /* Contact Button Styles */
    .contact-btn {
      background: var(--accent-gradient);
      color: white;
      border: 1px solid rgba(0, 243, 255, 0.3);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
    }
    .contact-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
      transform: translateY(-1px);
    }
    
    .scrape-status {
      margin-top: 15px; padding: 12px; border-radius: var(--radius-md);
      font-size: 0.9rem; display: none;
    }
    .scrape-status.loading { background: rgba(0, 243, 255, 0.1); color: var(--accent-primary); border: 1px solid rgba(0, 243, 255, 0.1); box-shadow: 0 0 10px rgba(0, 243, 255, 0.1); }
    .scrape-status.done { background: rgba(0, 255, 65, 0.1); color: var(--success); border: 1px solid rgba(0, 255, 65, 0.1); box-shadow: 0 0 10px rgba(0, 255, 65, 0.1); }
    .scrape-status.error { background: rgba(255, 0, 60, 0.1); color: var(--danger); border: 1px solid rgba(255, 0, 60, 0.1); box-shadow: 0 0 10px rgba(255, 0, 60, 0.1); }

    .hidden { display: none !important; }

    .btn-games {
      background: var(--accent-primary);
      color: white;
      border: 1px solid rgba(0, 243, 255, 0.4);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      grid-column: 1 / -1;
      justify-self: center;
      margin-top: 8px;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
      text-shadow: 0 0 4px rgba(255,255,255,0.5);
    }
    .btn-games:hover { filter: brightness(1.3); transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 243, 255, 0.5); }

    .game-card {
      background: rgba(0, 243, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .game-card:hover { border-color: var(--accent-primary); transform: translateX(4px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.1); }
    .game-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .game-card h4 { color: var(--text-main); font-size: 1.1rem; margin: 0; }
    .game-card p { font-size: 0.85rem; color: var(--text-muted); margin: 4px 0; }
    .game-card .score-range { color: var(--text-main); font-weight: 600; }

    .game-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .tag {
      font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--border-subtle); color: var(--text-muted);
    }
    .tag.api { border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: 0 0 8px rgba(0, 243, 255, 0.2); }
    .tag.vram { border-color: var(--success); color: var(--success); box-shadow: 0 0 8px rgba(0, 255, 65, 0.2); }
    .tag.score { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 8px rgba(255, 0, 60, 0.2); }

    .compat-badge {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 700; margin-top: 6px;
    }
    .compat-badge.yes { background: rgba(0, 255, 65, 0.15); color: var(--success); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
    .compat-badge.rec { background: rgba(0, 243, 255, 0.15); color: var(--accent-primary); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

    /* =========================================
       SOFTWARE MODAL CARD STYLES
       ========================================= */
    .software-item {

    .software-item h4 { 
      color: var(--accent-primary); 
      margin: 0 0 8px 0; 
      font-size: 1.1rem;

    .software-item p {

    .software-item a {
      display: inline-block;
      padding: 6px 14px;
      background: rgba(0, 243, 255, 0.1);
      border: 1px solid var(--accent-primary);
      border-radius: 6px;
      color: var(--accent-primary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .software-item a:hover { 
      background: var(--accent-primary); 
      color: #000; 
      box-shadow: 0 0 10px var(--accent-primary); 
    }
    
    @media (max-width: 768px) {
      .gpu-list { grid-template-columns: 1fr; }
      .compare-row { grid-template-columns: 1fr; }
      .header {

        gap: 12px; 
        text-align: center;

      .header-left, .header-center, .header-right { 
        justify-self: center; 
        width: 100%; 
      }
      .craptop-link img { height: 60px; max-width: 280px; }
    }
  </style>
</head>

<div id="suggestionsBox" class="suggestions-box"></div>

<script>
let currentFilter = 'all';
let lastSearch = null;
let GPU_DB = [];
let GAMES_DB = [];
let isLoading = false;
// REMOVED: let currentGameTab = 'all';
let currentView = 'gpus'; // Tracks whether we're viewing GPUs or Games

function init() {
  // Theme toggle removed to enforce dark mode
  setupSuggestions();
  loadDatabase();
}

async function loadDatabase() {
  showStatus('Initializing database...', 'loading');
  try {
    const [gpuRes, gameRes] = await Promise.all([
      fetch('gpus.json'),
      fetch('games.json').catch(() => Promise.resolve(null))
    ]);
    
    if (!gpuRes.ok) throw new Error('Failed to load gpus.json');
    GPU_DB.push(...await gpuRes.json());
    
    if (gameRes && gameRes.ok) {
      let rawData = await gameRes.json();
      GAMES_DB = rawData.flat();
      console.log(`✅ Successfully loaded ${GAMES_DB.length} games from games.json`);
    } else {
      console.warn('⚠️ games.json not found. Using fallback sample data.');
      GAMES_DB = [
        {title:"Cyberpunk 2077", score:15000, release_year:2018, directX:"12", notes:"Heavy DX12/Vulkan title."},
        {title:"Elden Ring", score:12000, release_year:2021, directX:"12", notes:"DX12 required."},
        {title:"Fortnite", score:3000, release_year:2017, directX:"11", notes:"Highly scalable."}
      ];
    }
    finalizeInit();
  } catch (err) {
    console.warn('Fallback dataset loaded due to error.', err);
    GPU_DB.push(
      {name:"RTX 4090",brand:"nvidia",type:"dGPU",year:2022,score:78500,vram:"24GB GDDR6X",tdp:450,arch:"Ada Lovelace"},
      {name:"RX 7900 XTX",brand:"amd",type:"dGPU",year:2022,score:52000,vram:"24GB GDDR6",tdp:355,arch:"RDNA 3"},
      {name:"Core Ultra 9 288V",brand:"intel",type:"igpu",year:2024,score:12000,vram:"Shared",tdp:35,arch:"Xe2"},
      {name:"GTX 1080 Ti",brand:"nvidia",type:"dGPU",year:2017,score:24000,vram:"11GB GDDR5X",tdp:250,arch:"Pascal"},
      {name:"RX 580 8GB",brand:"amd",type:"dGPU",year:2017,score:10000,vram:"8GB GDDR5",tdp:185,arch:"GCN 5"},
      {name:"RTX 3080",brand:"nvidia",type:"dGPU",year:2020,score:43000,vram:"10GB GDDR6X",tdp:320,arch:"Ampere"},
      {name:"RX 6800 XT",brand:"amd",type:"dGPU",year:2020,score:39000,vram:"16GB GDDR6",tdp:300,arch:"RDNA 2"},
      {name:"RTX 4070 Ti",brand:"nvidia",type:"dGPU",year:2023,score:38000,vram:"12GB GDDR6X",tdp:285,arch:"Ada Lovelace"}
    );
    finalizeInit();
  }
}

function finalizeInit() {
  GPU_DB.forEach(gpu => {
    const y = gpu.year;
    gpu.dx_hw = y < 2006 ? "DX8.1" : y < 2009 ? "DX9.0c" : y < 2012 ? "DX10.1" : y < 2015 ? "DX11" : y < 2020 ? "DX12" : y < 2024 ? "DX12_1" : "DX12_2";
    gpu.dx_sw = y < 2006 ? "SM 2.0" : y < 2009 ? "SM 3.0" : y < 2012 ? "SM 4.1" : y < 2015 ? "SM 5.0" : y < 2020 ? "SM 5.1" : y < 2024 ? "SM 6.3" : "SM 6.7";
    gpu.vulkan = y < 2016 ? "N/A" : y < 2019 ? "1.0" : y < 2021 ? "1.1" : y < 2023 ? "1.2" : "1.3";
    gpu.opengl = y < 2006 ? "2.0" : y < 2009 ? "2.1" : y < 2012 ? "3.0" : y < 2015 ? "3.3" : y < 2018 ? "4.1" : y < 2020 ? "4.5" : "4.6 (DRM)";
  });
  renderList(GPU_DB);
  showStatus('Database loaded successfully.', 'done');
}

function setupSuggestions() {
  const input = document.getElementById('searchInput');
  const box = document.getElementById('suggestionsBox');
  let timeout;

  function positionDropdown() {
    const rect = input.getBoundingClientRect();
    box.style.top = (rect.bottom + window.scrollY + 8) + 'px';
    box.style.left = rect.left + 'px';
    box.style.width = rect.width + 'px';
  }

  function showSuggestions(matches) {
    box.innerHTML = '';
    if (matches.length === 0) {
      box.classList.remove('active');
      return;
    }

    matches.forEach(match => {
      const div = document.createElement('div');
      div.className = 'suggestion-item';
      div.innerHTML = `<span>${match.name}</span><span class="suggestion-meta">${match.arch} • ${match.year}</span>`;
      div.onclick = () => {
        input.value = match.name;
        box.classList.remove('active');
        searchGPU(match);
      };
      box.appendChild(div);
    });

    positionDropdown();
    box.classList.add('active');
  }

  input.addEventListener('input', function() {
    clearTimeout(timeout);
    const query = this.value.trim().toLowerCase();
    if (query.length < 1) { box.classList.remove('active'); return; }

    timeout = setTimeout(() => {
      const matches = GPU_DB.filter(gpu => {
        const nameMatch = gpu.name.toLowerCase().includes(query);
        const archMatch = gpu.arch.toLowerCase().includes(query);
        const yearMatch = gpu.year.toString().includes(query);
        return nameMatch || archMatch || yearMatch;
      }).slice(0, 8);
      showSuggestions(matches);
    }, 150);
  });

  input.addEventListener('focus', positionDropdown);
  
  window.addEventListener('scroll', positionDropdown, true);
  window.addEventListener('resize', positionDropdown);

  document.addEventListener('click', function(e) {
    if (e.target !== input && !box.contains(e.target)) {
      box.classList.remove('active');
    }
  });

  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      searchGPU();
      box.classList.remove('active');
    }
  });
}

function searchGPU(specificMatch = null) {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query && !specificMatch) { clearSearch(); return; }

  let baseCard = specificMatch;
  if (!baseCard) {
    baseCard = GPU_DB.find(g => g.name.toLowerCase() === query) || GPU_DB.find(g => g.name.toLowerCase().includes(query));
    if (baseCard) document.getElementById('searchInput').value = baseCard.name;
    if (!baseCard) { showStatus('No GPU found matching that name.', 'error'); return; }
  }

  lastSearch = baseCard;
  currentView = 'gpus';
  showSimilarCards(baseCard);
}

function showSimilarCards(baseCard) {
  const resultsSection = document.getElementById('resultsSection');
  const resultsTitle = document.getElementById('resultsTitle');
  const resultsCount = document.getElementById('resultsCount');
  const gpuList = document.getElementById('gpuList');

  let similar = GPU_DB
    .map(gpu => {
      const diff = gpu.score - baseCard.score;
      const pctDiff = ((diff / baseCard.score) * 100).toFixed(1);
      return { ...gpu, diff, pctDiff, isBase: gpu.name === baseCard.name };
    })
    .sort((a, b) => a.diff - b.diff);

  const filtered = similar.filter(g => !g.isBase);
  const faster = filtered.filter(g => g.diff < 0).sort((a, b) => b.diff - a.diff).slice(0, 7);
  const slower = filtered.filter(g => g.diff > 0).sort((a, b) => a.diff - b.diff).slice(0, 8);
  const finalList = [...faster, baseCard, ...slower];

  resultsSection.classList.remove('hidden');
  resultsTitle.textContent = `Similar to: ${baseCard.name}`;
  resultsCount.textContent = `${finalList.length} cards shown`;

  gpuList.innerHTML = finalList.map((gpu, i) => {
    const isBase = gpu.isBase;
    const isFaster = gpu.diff > 0;
    const isSlower = gpu.diff < 0;
    const cardClass = isBase ? 'base-card' : (isFaster ? 'faster' : 'slower');
    const diffClass = isFaster ? 'positive' : 'negative';
    const diffIcon = isFaster ? '+' : '';
    const rankClass = i < 3 ? 'top3' : '';

    return `
      <div class="gpu-card ${cardClass} brand-${gpu.brand}" data-card1='${JSON.stringify(baseCard).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
        <div class="card-top">
            <div class="gpu-name">
                <h3>${gpu.name} ${isBase ? '<span class="base-label">(BASE)</span>' : ''}</h3>
                <div class="gpu-meta">
                    <span>${gpu.arch}</span>
                    <span>${gpu.year}</span>
                    <span>${gpu.vram}</span>
                </div>
                <div class="gpu-tags">
                    <span class="api-badge">DX:${gpu.dx_hw}</span>
                    <span class="api-badge">VK:${gpu.vulkan}</span>
                    <span class="api-badge">GL:${gpu.opengl}</span>
                </div>
            </div>
            <div class="gpu-rank ${rankClass}">#${i + 1}</div>
        </div>
        
        <div class="card-bottom">
            <div class="gpu-diff ${diffClass}">
                <div class="val">${diffIcon}${gpu.pctDiff}%</div>
                <div class="label">Diff</div>
            </div>
            <div class="gpu-score">
                <div class="val">${gpu.score.toLocaleString()}</div>
                <div class="label">Score</div>
            </div>
        </div>
        <div class="gpu-specs">
            <span>${gpu.tdp}W • ${gpu.brand.toUpperCase()}</span>
        </div>
        <button class="btn-games" onclick="event.stopPropagation(); openGamesModal('${gpu.name}')">🎮 Compatible Games</button>
      </div>
    `;
  }).join('');

  showStatus(`Found ${finalList.length} cards with similar performance to ${baseCard.name}. Click a card to compare.`, 'done');
}

function renderList(gpus) {
  const container = document.getElementById('gpuList');
  const resultsSection = document.getElementById('resultsSection');
  const resultsTitle = document.getElementById('resultsTitle');
  const resultsCount = document.getElementById('resultsCount');

  const sortedGpus = [...gpus].sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.name.localeCompare(b.name);
  });

  container.innerHTML = sortedGpus.map((gpu, i) => `
    <div class="gpu-card brand-${gpu.brand}" data-card1='${JSON.stringify(lastSearch || gpus[0]).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
      <div class="card-top">
        <div class="gpu-name">
          <h3>${gpu.name}</h3>
          <div class="gpu-meta">
            <span>${gpu.arch}</span>
            <span>${gpu.year}</span>
            <span>${gpu.vram}</span>
          </div>
          <div class="gpu-tags">
              <span class="api-badge">DX:${gpu.dx_hw}</span>
              <span class="api-badge">VK:${gpu.vulkan}</span>
              <span class="api-badge">GL:${gpu.opengl}</span>
          </div>
        </div>
        <div class="gpu-rank">${i + 1}</div>
      </div>
      
      <div class="card-bottom">
        <div class="gpu-score">
          <div class="val">${gpu.score.toLocaleString()}</div>
          <div class="label">Score</div>
        </div>
        <div class="gpu-specs">
            <span>${gpu.tdp}W</span>
            <span class="brand-name">${gpu.brand.toUpperCase()}</span>
        </div>
      </div>
      <button class="btn-games" onclick="event.stopPropagation(); openGamesModal('${gpu.name}')">🎮 Compatible Games</button>
    </div>
  `).join('');

  resultsSection.classList.remove('hidden');
  resultsTitle.textContent = filterLabel(currentFilter);
  resultsCount.textContent = `${gpus.length} cards found`;
}

// ============================================================
// NEW: All Games in Database View
// ============================================================

function showAllGames() {
  currentView = 'games';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnAllGames').classList.add('active');
  renderGameListGlobal(GAMES_DB);
}

function renderGameListGlobal(games) {
  const container = document.getElementById('gpuList');
  const resultsSection = document.getElementById('resultsSection');
  const resultsTitle = document.getElementById('resultsTitle');
  const resultsCount = document.getElementById('resultsCount');

  // Sort games by score descending
  const sortedGames = [...games].sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));

  resultsTitle.textContent = 'All Games in Database';
  resultsCount.textContent = `${sortedGames.length} games found`;
  resultsSection.classList.remove('hidden');

  container.innerHTML = sortedGames.map((game, i) => {
    const score = Number(game.score) || 0;
    const year = game.release_year || game.year || 'N/A';
    const directX = game.directX || 'N/A';
    
    return `
      <div class="game-card-list">
        <div class="card-top">
          <div class="gpu-name">
            <h3>${game.title}</h3>
            <div class="gpu-meta">
              <span>${year}</span>
              <span>DX:${directX}</span>
              <span>Min Score: ${score.toLocaleString()}</span>
            </div>
            <div class="gpu-tags">
              <span class="api-badge">Score: ${score.toLocaleString()}</span>
            </div>
          </div>
          <div class="gpu-rank">#${i + 1}</div>
        </div>
        
        <div class="card-bottom">
          <div class="gpu-score">
            <div class="val">${score.toLocaleString()}</div>
            <div class="label">Min Score</div>
          </div>
        </div>
        <div class="gpu-specs">
          <span>${game.notes || 'No additional notes.'}</span>
        </div>
        <!-- NEW: Compatible GPUs Button -->
        <button class="btn-games" onclick="event.stopPropagation(); showCompatibleGPUs('${game.title.replace(/'/g, "\\'")}', ${score})">🔍 Compatible GPUs</button>
      </div>
    `;
  }).join('');

  showStatus(`Showing all ${sortedGames.length} games in the database.`, 'done');
}

function getGameCompatibility(gpu, game) {
  if (!game.score) return 'no';
  if (gpu.score >= game.score) {
    if (game.recommended_score && gpu.score >= game.recommended_score) {
      return 'recommended';
    }
    return 'compatible';
  }
  return 'no';
}

// UPDATED: openGamesModal function
function openGamesModal(gpuName) {
  const gpu = GPU_DB.find(g => g.name === gpuName);
  if (!gpu) return;

  // Filter & sort compatible games by performance score
  const compatibleGames = GAMES_DB
    .map(game => ({ 
      ...game, 
      status: getGameCompatibility(gpu, game),
      score: Number(game.score) || 0,
      year: game.release_year || 'N/A'
    }))
    .filter(g => g.status !== 'no')
    .sort((a, b) => b.score - a.score); // Sort by score descending

  const modal = document.getElementById('gamesModal');
  const title = document.getElementById('gamesModalTitle');
  
  title.textContent = `🎮 Compatible Games for ${gpu.name}`;
  
  // Directly render without tab/storage overhead
  renderGameList(compatibleGames);
  modal.classList.add('active');
}

function renderGameList(games) {
  const content = document.getElementById('gamesModalContent');
  
  if (games.length === 0) {
    content.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:20px;">No compatible games found for this GPU.</p>`;
    return;
  }

  content.innerHTML = games.map(game => {
    let badgeClass = game.status === 'recommended' ? 'rec' : 'yes';
    let badgeText = game.status === 'recommended' ? '✅ Recommended' : '✔️ Compatible';
    
    const year = game.release_year || game.year || 'N/A';
    const directX = game.directX || 'N/A';
    
    return `
      <div class="game-card">
        <div class="game-card-header">
          <h4>${game.title}</h4>
          <span class="compat-badge ${badgeClass}">${badgeText}</span>
        </div>
        <p><span class="score-range">Game Score:</span> ${game.score.toLocaleString()}</p>
        <div class="game-tags">
          <span class="tag score">Min Score: ${game.score}</span>
          <span class="tag">Year: ${year}</span>
          <span class="tag">DirectX: ${directX}</span>
        </div>
        ${game.notes ? `<p style="margin-top:8px;"><em>${game.notes}</em></p>` : ''}
      </div>
    `;
  }).join('');
}

// REMOVED: filterGamesByTab function

function closeGamesModal() {
  document.getElementById('gamesModal').classList.remove('active');
}

document.getElementById('gamesModal')?.addEventListener('click', (e) => {
  if (e.target.id === 'gamesModal') closeGamesModal();
});

// ============================================================
// NEW: Compatible GPUs Modal Logic
// ============================================================

function showCompatibleGPUs(title, score) {
  const compatibleGPUs = GPU_DB.filter(gpu => gpu.score >= score)
    .sort((a, b) => b.score - a.score);
  
  document.getElementById('compatibleGPUsTitle').textContent = `Compatible GPUs for ${title}`;
  const listContainer = document.getElementById('compatibleGPUsList');
  
  if (compatibleGPUs.length === 0) {
    listContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding: 20px;">No compatible GPUs found in the database.</p>';
  } else {
    listContainer.innerHTML = compatibleGPUs.map((gpu, i) => {
      const diff = gpu.score - score;
      const pctDiff = ((diff / score) * 100).toFixed(1);
      const isFaster = diff > 0;
      const diffClass = isFaster ? 'positive' : 'negative';
      const diffIcon = isFaster ? '+' : '';
      
      return `
        <div class="gpu-card brand-${gpu.brand}" onclick="showComparison(lastSearch || GPU_DB[0], ${JSON.stringify(gpu).replace(/'/g, "&#39;")})">
          <div class="card-top">
              <div class="gpu-name">
                  <h3>${gpu.name}</h3>
                  <div class="gpu-meta">
                      <span>${gpu.arch}</span>
                      <span>${gpu.year}</span>
                      <span>${gpu.vram}</span>
                  </div>
                  <div class="gpu-tags">
                      <span class="api-badge">DX:${gpu.dx_hw}</span>
                      <span class="api-badge">VK:${gpu.vulkan}</span>
                      <span class="api-badge">GL:${gpu.opengl}</span>
                  </div>
              </div>
              <div class="gpu-rank">#${i + 1}</div>
          </div>
          <div class="card-bottom">
              <div class="gpu-diff ${diffClass}">
                  <div class="val">${diffIcon}${pctDiff}%</div>
                  <div class="label">Above Min</div>
              </div>
              <div class="gpu-score">
                  <div class="val">${gpu.score.toLocaleString()}</div>
                  <div class="label">Score</div>
              </div>
          </div>
          <div class="gpu-specs">
              <span>${gpu.tdp}W • ${gpu.brand.toUpperCase()}</span>
          </div>
        </div>
      `;
    }).join('');
  }
  
  document.getElementById('compatibleGPUsModal').classList.add('active');
}

function closeCompatibleGPUsModal() {
  document.getElementById('compatibleGPUsModal').classList.remove('active');
}

document.getElementById('compatibleGPUsModal')?.addEventListener('click', (e) => {
  if (e.target.id === 'compatibleGPUsModal') closeCompatibleGPUsModal();
});

// ============================================================
// SOFTWARE MODAL LOGIC
// ============================================================
const SOFTWARE_LIST = [
  { name: "Ninite", desc: "Streamlines installing/updating multiple desktop apps simultaneously. Silently downloads official installers, applies safe defaults, and blocks bundled software.", link: "https://ninite.com/" },
  { name: "ThrottleStop", desc: "Advanced power management & undervolting utility for Intel laptops. Disables turbo boost, adjusts power limits, and creates custom fan curves to reduce heat/throttling.", link: "https://www.techpowerup.com/download/techpowerup-throttlestop/" },
  { name: "GPU-Z", desc: "Lightweight, detailed hardware information & verification tool for GPUs. Displays real-time sensors, driver details, and verifies hardware authenticity.", link: "https://www.techpowerup.com/gpuz/" },
  { name: "HWMonitor", desc: "Comprehensive hardware monitoring program reading real-time sensor data from CPUs, GPUs, motherboards, and storage drives for live health tracking.", link: "https://www.cpuid.com/softwares/hwmonitor.html" },
  { name: "CPU-Z", desc: "Detailed system information utility reporting accurate data about processors, cache, mainboard, RAM, and SPD modules. Validates specs and provides hardware IDs.", link: "https://www.cpuid.com/softwares/cpu-z.html" },
  { name: "UXTU", desc: "Open-source, cross-platform tuning tool unifying laptop performance management for AMD & Intel. Consolidates power limits, profiles, and fan curves.", link: "https://github.com/JamesCJ60/Universal-x86-Tuning-Utility/releases" },
  { name: "G-Helper", desc: "Lightweight, open-source alternative to OEM bloatware. Manages fan control, performance modes, RGB, monitoring, and battery limits in a clean interface.", link: "https://g-helper.com/" },
  { name: "MSI Afterburner", desc: "Industry-standard GPU overclocking & monitoring utility compatible with all NVIDIA/AMD cards. Adjusts clocks/voltage/fan curves with real-time OSD.", link: "https://www.msi.com/Landing/afterburner/graphics-cards" }
];

function openSoftwareModal() {
  const listContainer = document.getElementById('softwareList');
  listContainer.innerHTML = SOFTWARE_LIST.map(s => `
    <div class="software-item">
      <h4>${s.name}</h4>
      <p>${s.desc}</p>
      <a href="${s.link}" target="_blank" rel="noopener noreferrer">🔗 Download / Visit Official Site</a>
    </div>
  `).join('');
  document.getElementById('softwareModal').classList.add('active');
}

function closeSoftwareModal() {
  document.getElementById('softwareModal').classList.remove('active');
}

document.getElementById('softwareModal')?.addEventListener('click', (e) => {
  if (e.target.id === 'softwareModal') closeSoftwareModal();
});

// ============================================================
// COMPARISON MODAL
// ============================================================

function showComparison(card1, card2) {
  const modal = document.getElementById('comparisonModal');
  const content = document.getElementById('compareContent');
  
  const pctDiff = ((card2.score - card1.score) / card1.score * 100).toFixed(1);
  const faster = card2.score > card1.score;
  const diffClass = faster ? 'diff-faster' : 'diff-slower';
  const diffIcon = faster ? '+' : '';

  const renderAPI = (gpu) => `
    <div class="api-grid">
      <div class="api-item"><div class="api-label">DX HW</div><div class="api-val">${gpu.dx_hw || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">DX SW</div><div class="api-val">${gpu.dx_sw || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">Vulkan</div><div class="api-val">${gpu.vulkan || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">OpenGL</div><div class="api-val">${gpu.opengl || 'N/A'}</div></div>
    </div>
  `;

  content.innerHTML = `
    <div class="compare-row">
      <div class="compare-item">
        <h4>${card1.name}</h4>
        <p><strong>Score:</strong> ${card1.score.toLocaleString()}</p>
        <p><strong>Architecture:</strong> ${card1.arch}</p>
        <p><strong>VRAM:</strong> ${card1.vram}</p>
        <p><strong>TDP:</strong> ${card1.tdp}W</p>
        <p><strong>Year:</strong> ${card1.year}</p>
        ${renderAPI(card1)}
      </div>
      <div class="compare-item">
        <h4>${card2.name}</h4>
        <p><strong>Score:</strong> ${card2.score.toLocaleString()}</p>
        <p><strong>Architecture:</strong> ${card2.arch}</p>
        <p><strong>VRAM:</strong> ${card2.vram}</p>
        <p><strong>TDP:</strong> ${card2.tdp}W</p>
        <p><strong>Year:</strong> ${card2.year}</p>
        ${renderAPI(card2)}
      </div>
    </div>
    <div class="comparison-verdict">
      <p style="font-size:1.1rem; color:var(--text-muted); margin-bottom:8px;">Comparison Result</p>
      <p style="font-size:1.2rem;">
        ${card2.name} is <strong class="${diffClass}" style="font-size:1.4rem;">${diffIcon}${pctDiff}%</strong> ${faster ? 'faster' : 'slower'} than ${card1.name}
      </p>
    </div>
  `;
  
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('comparisonModal').classList.remove('active');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultsSection').classList.add('hidden');
  document.getElementById('statusBar').style.display = 'none';
  document.getElementById('suggestionsBox').classList.remove('active');
  lastSearch = null;
  currentView = 'gpus';
  renderList(GPU_DB);
}

function filterList(filter, btn) {
  currentView = 'gpus';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  let filtered = GPU_DB;
  if (filter === 'nvidia') filtered = GPU_DB.filter(g => g.brand === 'nvidia');
  else if (filter === 'amd') filtered = GPU_DB.filter(g => g.brand === 'amd');
  else if (filter === 'intel') filtered = GPU_DB.filter(g => g.brand === 'intel');
  else if (filter === 'igpu') filtered = GPU_DB.filter(g => g.type === 'igpu');
  
  renderList(filtered);
}

function filterLabel(f) {
  if (f === 'all') return 'All GPUs in Database';
  if (f === 'nvidia') return 'NVIDIA GPUs';
  if (f === 'amd') return 'AMD GPUs';
  if (f === 'intel') return 'Intel iGPUs';
  if (f === 'igpu') return 'Integrated GPUs';
  return 'GPUs';
}

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = `scrape-status ${type}`;
  bar.style.display = 'block';
  setTimeout(() => { bar.style.display = 'none'; }, 5000);
}

init();
</script>
