<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU & Game Compatibility Checker</title>
  <style>
    :root {
      --bg-primary: #111;
      --bg-secondary: #1a1a1a;
      --text-primary: #eee;
      --text-muted: #888;
      --accent-primary: #38bdf8;
      --border-subtle: #333;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 24px; }

    /* Search & Suggestions */
    .search-section { margin-bottom: 24px; position: relative; }
    #searchInput { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-subtle); background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem; }
    #suggestionsBox { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-top: none; border-radius: 0 0 8px 8px; z-index: 10; display: none; max-height: 300px; overflow-y: auto; }
    #suggestionsBox.active { display: block; }
    .suggestion-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border-subtle); }
    .suggestion-item:hover { background: rgba(56, 189, 248, 0.1); }
    .suggestion-meta { font-size: 0.8rem; color: var(--text-muted); }

    /* View Switcher Buttons */
    .view-switcher { display: flex; justify-content: center; gap: 16px; margin: 24px 0; flex-wrap: wrap; }
    .nav-btn { padding: 12px 28px; font-size: 1rem; font-weight: 600; border: 1px solid var(--border-subtle); background: var(--bg-secondary); color: var(--text-primary); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
    .nav-btn:hover { background: var(--accent-primary); color: #000; border-color: var(--accent-primary); transform: translateY(-1px); }
    .nav-btn.active { background: var(--accent-primary); color: #000; border-color: var(--accent-primary); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

    /* Shared Grid Container */
    .gpu-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 16px; }

    /* GPU Card Styles (from your citations) */
    .gpu-card { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px; transition: transform 0.2s; cursor: pointer; }
    .gpu-card:hover { transform: translateY(-2px); border-color: var(--accent-primary); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .gpu-rank { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }
    .gpu-rank.top3 { color: var(--accent-primary); background: rgba(56, 189, 248, 0.1); }
    .gpu-name h3 { font-size: 1.05rem; margin-bottom: 2px; line-height: 1.3; }
    .gpu-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .gpu-meta span::after { content: '•'; margin-left: 6px; color: var(--border-subtle); }
    .gpu-meta span:last-child::after { content: ''; }
    .gpu-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .api-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); color: var(--text-muted); font-family: monospace; }
    .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-subtle); }
    .gpu-score .val { font-size: 1.5rem; font-weight: 700; color: var(--accent-primary); }
    .gpu-score .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .gpu-specs { margin-top: 8px; font-size: 0.8rem; color: var(--text-muted); }

    /* Game Card Styles (reuses GPU card structure) */
    .game-card { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px; transition: transform 0.2s; cursor: pointer; }
    .game-card:hover { transform: translateY(-2px); border-color: var(--accent-primary); }
    .game-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .game-card-header h4 { font-size: 1.05rem; margin: 0; line-height: 1.3; }
    .compat-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; font-weight: 600; }
    .compat-badge.rec { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .compat-badge.yes { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
    .game-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); color: var(--text-muted); }
    .tag.score { color: var(--accent-primary); border-color: rgba(56, 189, 248, 0.3); }
    .score-range { color: var(--text-muted); font-size: 0.85rem; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 12px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
    .game-tab-container { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .game-tab { padding: 8px 16px; border-radius: 6px; background: var(--bg-primary); border: 1px solid var(--border-subtle); color: var(--text-muted); cursor: pointer; }
    .game-tab.active { background: var(--accent-primary); color: #000; border-color: var(--accent-primary); }
    #gamesModalContent { display: grid; gap: 12px; }

    /* Status */
    .status-msg { text-align: center; padding: 20px; color: var(--text-muted); }
    .loading { color: var(--accent-primary); }
  </style>
</head>
<body>
  <div class="container">
    <h1>GPU & Game Compatibility Checker</h1>

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="Search GPU (e.g., RTX 4090, RX 7900 XTX)...">
      <div id="suggestionsBox"></div>
    </div>

    <div id="statusArea" class="status-msg"></div>

    <!-- View Switcher Buttons -->
    <div class="view-switcher">
      <button id="btn-gpu-db" class="nav-btn active" onclick="switchView('gpu')">🖥️ GPU Database</button>
      <button id="btn-games" class="nav-btn" onclick="switchView('games')">🎮 Games</button>
    </div>

    <!-- GPU List -->
    <div id="gpuList" class="gpu-list-container"></div>

    <!-- Games List (Main Page) -->
    <div id="gamesList" class="gpu-list-container" style="display: none;"></div>
  </div>

  <!-- Games Modal -->
  <div id="gamesModal" class="modal-overlay" onclick="closeGamesModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeGamesModal()">&times;</button>
      <h2>Compatible Games</h2>
      <div class="game-tab-container">
        <button class="game-tab active" onclick="filterGamesByTab('all')">All</button>
        <button class="game-tab" onclick="filterGamesByTab('12')">DX12</button>
        <button class="game-tab" onclick="filterGamesByTab('11')">DX11</button>
        <button class="game-tab" onclick="filterGamesByTab('9')">DX9</button>
      </div>
      <div id="gamesModalContent"></div>
    </div>
  </div>

  <script>
    let GPU_DB = [];
    let GAMES_DB = [];
    let currentGameTab = 'all';
    let lastSearch = null;

    // Helper to safely extract numeric DirectX version
    function getDXLevel(directX) {
      if (!directX) return 0;
      const match = directX.toString().match(/(\d+)/);
      return match ? parseInt(match[0]) : 0;
    }

    // View Switcher Logic
    function switchView(view) {
      document.getElementById('btn-gpu-db').classList.toggle('active', view === 'gpu');
      document.getElementById('btn-games').classList.toggle('active', view === 'games');

      if (view === 'gpu') {
        renderList(GPU_DB);
        document.getElementById('gpuList').style.display = 'grid';
        document.getElementById('gamesList').style.display = 'none';
      } else {
        if (!GAMES_DB || GAMES_DB.length === 0) {
          document.getElementById('gamesList').innerHTML = `
            <p style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
              Game database not loaded yet. Please refresh or check your network.
            </p>`;
          document.getElementById('gamesList').style.display = 'grid';
          return;
        }

        // Sort by DirectX level (newest → oldest), then by score (highest → lowest)
        const sortedGames = [...GAMES_DB].sort((a, b) => {
          const dxA = getDXLevel(a.directX);
          const dxB = getDXLevel(b.directX);
          if (dxB !== dxA) return dxB - dxA;
          return b.score - a.score;
        });

        renderGamesListView(sortedGames);
        document.getElementById('gpuList').style.display = 'none';
        document.getElementById('gamesList').style.display = 'grid';
      }
    }

    // Render Games List for Main Page
    function renderGamesListView(games) {
      const container = document.getElementById('gamesList');
      if (!container) return;

      container.innerHTML = games.map((game, i) => `
        <div class="game-card" onclick="openGamesModal('${game.title}')">
          <div class="game-card-header">
            <h4>${game.title}</h4>
            <span class="compat-badge ${game.status === 'recommended' ? 'rec' : 'yes'}">${game.status === 'recommended' ? '✅ Recommended' : '✔️ Compatible'}</span>
          </div>
          <p><span class="score-range">Game Score:</span> ${game.score.toLocaleString()}</p>
          <div class="game-tags">
            <span class="tag score">Min Score: ${game.score}</span>
            <span class="tag">Year: ${game.release_year || game.year || 'N/A'}</span>
            <span class="tag">DirectX: ${game.directX || 'N/A'}</span>
          </div>
          ${game.notes ? `<p style="margin-top:8px;"><em>${game.notes}</em></p>` : ''}
        </div>
      `).join('');
    }

    // Render GPU List (from your citations)
    function renderList(gpus) {
      const container = document.getElementById('gpuList');
      const sortedGpus = [...gpus].sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.name.localeCompare(b.name);
      });

      container.innerHTML = sortedGpus.slice(0, 300).map((gpu, i) => `
        <div class="gpu-card brand-${gpu.brand}" data-card1='${JSON.stringify(lastSearch || gpus[0]).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
          <div class="card-top">
            <div class="gpu-name">
              <h3>${gpu.name}</h3>
              <div class="gpu-meta">
                <span>${gpu.arch}</span>
                <span>${gpu.year}</span>
                <span>${gpu.vram}</span>
              </div>
              <div class="gpu-tags">
                <span class="api-badge">DX:${gpu.dx_hw}</span>
                <span class="api-badge">VK:${gpu.vulkan}</span>
                <span class="api-badge">GL:${gpu.opengl}</span>
              </div>
            </div>
            <div class="gpu-rank ${i < 3 ? 'top3' : ''}">#${i + 1}</div>
          </div>
          <div class="card-bottom">
            <div class="gpu-diff">
              <div class="val">${gpu.pctDiff}%</div>
              <div class="label">Diff</div>
            </div>
            <div class="gpu-score">
              <div class="val">${gpu.score.toLocaleString()}</div>
              <div class="label">Score</div>
            </div>
          </div>
          <div class="gpu-specs">
            <span>${gpu.tdp}W • ${gpu.brand.toUpperCase()}</span>
          </div>
          <button class="btn-games" onclick="event.stopPropagation(); openGamesModal('${gpu.name}')" style="margin-top:12px; width:100%; padding:8px; cursor:pointer;">🎮 Compatible Games</button>
        </div>
      `).join('');
    }

    // Modal Logic (from your citations)
    function openGamesModal(gpuName = '') {
      const modal = document.getElementById('gamesModal');
      // Filter compatible games (adjust filter logic as needed for your use case)
      const compatibleGames = GAMES_DB.filter(g => !gpuName || g.compatible_gpu === gpuName);
      modal.dataset.fullList = JSON.stringify(compatibleGames);
      renderGameList(compatibleGames);
      modal.classList.add('active');
    }

    function renderGameList(games) {
      const content = document.getElementById('gamesModalContent');
      if (games.length === 0) {
        content.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:20px;">No compatible games found.</p>`;
        return;
      }
      content.innerHTML = games.map(game => `
        <div class="game-card">
          <div class="game-card-header">
            <h4>${game.title}</h4>
            <span class="compat-badge ${game.status === 'recommended' ? 'rec' : 'yes'}">${game.status === 'recommended' ? '✅ Recommended' : '✔️ Compatible'}</span>
          </div>
          <p><span class="score-range">Game Score:</span> ${game.score.toLocaleString()}</p>
          <div class="game-tags">
            <span class="tag score">Min Score: ${game.score}</span>
            <span class="tag">Year: ${game.release_year || game.year}</span>
            <span class="tag">DirectX: ${game.directX}</span>
          </div>
          ${game.notes ? `<p style="margin-top:8px;"><em>${game.notes}</em></p>` : ''}
        </div>
      `).join('');
    }

    function filterGamesByTab(apiLevel) {
      document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
      const buttons = document.querySelectorAll('.game-tab');
      if(apiLevel === 'all') buttons[0].classList.add('active');
      if(apiLevel === '12') buttons[1].classList.add('active');
      if(apiLevel === '11') buttons[2].classList.add('active');
      if(apiLevel === '9') buttons[3].classList.add('active');

      currentGameTab = apiLevel;
      const modal = document.getElementById('gamesModal');
      const fullList = modal.dataset.fullList ? JSON.parse(modal.dataset.fullList) : [];

      if (apiLevel === 'all') {
        renderGameList(fullList);
      } else {
        // Updated to use DirectX numeric matching instead of g.api
        const filtered = fullList.filter(g => getDXLevel(g.directX) === parseInt(apiLevel));
        filtered.sort((a, b) => b.score - a.score);
        renderGameList(filtered);
      }
    }

    function closeGamesModal(e) {
      if (!e || e.target.id === 'gamesModal' || e.target.classList.contains('modal-close')) {
        document.getElementById('gamesModal').classList.remove('active');
      }
    }

    // Suggestions Logic (from your citations)
    function setupSuggestions() {
      const input = document.getElementById('searchInput');
      const box = document.getElementById('suggestionsBox');
      let timeout;

      function positionDropdown() {
        const rect = input.getBoundingClientRect();
        box.style.top = (rect.bottom + window.scrollY + 8) + 'px';
        box.style.left = rect.left + 'px';
        box.style.width = rect.width + 'px';
      }

      function showSuggestions(matches) {
        box.innerHTML = '';
        if (matches.length === 0) { box.classList.remove('active'); return; }
        matches.forEach(match => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.innerHTML = `<span>${match.name}</span><span class="suggestion-meta">${match.arch} • ${match.year}</span>`;
          div.onclick = () => {
            input.value = match.name;
            box.classList.remove('active');
            // searchGPU(match); // Hook into your existing search function
          };
          box.appendChild(div);
        });
        positionDropdown();
        box.classList.add('active');
      }

      input.addEventListener('input', function() {
        clearTimeout(timeout);
        const query = this.value.trim().toLowerCase();
        if (query.length < 1) { box.classList.remove('active'); return; }
        timeout = setTimeout(() => {
          const matches = GPU_DB.filter(gpu => gpu.name.toLowerCase().includes(query));
          showSuggestions(matches);
        }, 150);
      });

      document.addEventListener('click', (e) => {
        if (!input.contains(e.target) && !box.contains(e.target)) box.classList.remove('active');
      });
    }

    // Database Loader (from your citations)
    async function loadDatabase() {
      showStatus('Initializing database...', 'loading');
      try {
        const [gpuRes, gameRes] = await Promise.all([
          fetch('gpus.json'),
          fetch('games.json').catch(() => Promise.resolve(null))
        ]);

        if (!gpuRes.ok) throw new Error('Failed to load gpus.json');
        GPU_DB.push(...await gpuRes.json());

        if (gameRes && gameRes.ok) {
          let rawData = await gameRes.json();
          GAMES_DB = rawData.flat();
          console.log(`✅ Successfully loaded ${GAMES_DB.length} games from games.json`);
        } else {
          console.warn('⚠️ games.json not found. Using fallback sample data.');
          // Matches your requested JSON structure exactly
          GAMES_DB = [
            {title:"Ready or Not", score:3500, release_year:2019, directX:"DirectX 11", notes:"Tactical shooter."},
            {title:"Cyberpunk 2077", score:15000, release_year:2018, directX:"DirectX 12", notes:"Heavy DX12/Vulkan title."},
            {title:"Elden Ring", score:12000, release_year:2021, directX:"DX12", notes:"DX12 required."},
            {title:"Fortnite", score:3000, release_year:2017, directX:"DirectX 11", notes:"Highly scalable."}
          ];
        }
        finalizeInit();
      } catch (err) {
        console.warn('Fallback dataset loaded due to error.', err);
        GPU_DB.push(
          {name:"RTX 4090",brand:"nvidia",type:"dGPU",year:2022,score:78500,vram:"24GB GDDR6X",tdp:450,arch:"Ada Lovelace",dx_hw:12,vulkan:1.3,opengl:4.6,pctDiff:0},
          {name:"RX 7900 XTX",brand:"amd",type:"dGPU",year:2022,score:68000,vram:"24GB GDDR6",tdp:355,arch:"RDNA 3",dx_hw:12,vulkan:1.3,opengl:4.6,pctDiff:-13.4}
        );
        GAMES_DB = GAMES_DB.length ? GAMES_DB : [];
        finalizeInit();
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusArea');
      el.textContent = msg;
      el.className = 'status-msg ' + (type || '');
    }

    function finalizeInit() {
      showStatus('Database loaded successfully.', 'done');
      renderList(GPU_DB);
      setupSuggestions();
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', loadDatabase);
  </script>
</body>
</html>
