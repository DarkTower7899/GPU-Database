<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU Performance Database (2006–2026)</title>
  <meta name="description" content="Search, compare, and analyze 400+ GPUs with live benchmark scores, API support, and performance deltas.">
  <style>
    /* =========================================
       THEME VARIABLES & RESET
       ========================================= */
    :root {
      /* Dark Mode (Default) */
      --bg-body: #0b0f19;
      --bg-panel: rgba(30, 41, 59, 0.7);
      --bg-card: rgba(30, 41, 59, 0.4);
      --bg-card-hover: rgba(51, 65, 85, 0.5);
      
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(56, 189, 248, 0.5);
      
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --accent-primary: #38bdf8;
      --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      
      --success: #10b981;
      --danger: #f43f5e;
      
      --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-glow: 0 0 20px rgba(56, 189, 248, 0.15);
      
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 6px;
      
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-body: #f1f5f9;
      --bg-panel: rgba(255, 255, 255, 0.8);
      --bg-card: rgba(255, 255, 255, 0.6);
      --bg-card-hover: #ffffff;
      
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-focus: rgba(59, 130, 246, 0.5);
      
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      --accent-primary: #2563eb;
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      
      --success: #059669;
      --danger: #dc2626;
      
      --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-body);
      color: var(--text-main);
      transition: background-color 0.3s ease;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(129, 140, 248, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
      line-height: 1.5;
    }

    /* =========================================
       HEADER
       ========================================= */
    .header {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      position: sticky; top: 0; z-index: 100;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-content h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .header-content p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .header-actions {
      display: flex; align-items: center; gap: 12px;
    }

    /* =========================================
       CONTROLS & SEARCH
       ========================================= */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .control-panel {
      background: var(--bg-panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-card);
    }

    .search-row {
      display: flex; gap: 12px; margin-bottom: 16px;
      position: relative;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 14px 14px 42px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-size: 1rem;
      transition: var(--transition);
      font-family: inherit;
    }

    [data-theme="light"] input[type="text"] { background: rgba(255,255,255,0.5); }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .suggestions-box {
      position: absolute; top: 110%; left: 0; right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-glow);
      z-index: 50;
      display: none;
      overflow: hidden;
    }
    .suggestions-box.active { display: block; }
    
    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; justify-content: space-between;
      font-size: 0.9rem;
    }
    .suggestion-item:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent-primary); }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-meta { color: var(--text-muted); font-size: 0.8rem; }

    .btn {
      padding: 0 24px; height: 48px;
      border: none; border-radius: var(--radius-md);
      cursor: pointer; font-weight: 600; font-size: 0.95rem;
      transition: var(--transition);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
    }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text-main); }

    /* Filter Chips */
    .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      cursor: pointer; font-size: 0.85rem; font-weight: 500;
      transition: var(--transition);
    }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text-main); }
    .filter-btn.active {
      background: rgba(56, 189, 248, 0.1);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    /* =========================================
       RESULTS GRID & CARDS
       ========================================= */
    .results-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 24px 0 16px; padding: 0 4px;
    }
    .results-header h2 { font-size: 1.25rem; font-weight: 600; }
    .results-header span { color: var(--text-muted); font-size: 0.9rem; }

    .gpu-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .gpu-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .gpu-card:hover {
      border-color: var(--accent-primary);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    /* Left Accent Bar */
    .gpu-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--border-subtle);
    }
    .gpu-card.base-card::before { background: var(--accent-primary); }
    .gpu-card.faster::before { background: var(--success); }
    .gpu-card.slower::before { background: var(--danger); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    
    .gpu-rank {
      font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
      background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px;
    }
    .gpu-rank.top3 { color: var(--accent-primary); background: rgba(56, 189, 248, 0.1); }

    .gpu-name h3 {
      font-size: 1.05rem; margin-bottom: 2px; line-height: 1.3;
    }
    .gpu-name .base-label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--accent-primary); font-weight: 700; margin-left: 6px;
    }
    .gpu-meta {
      font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap;
    }
    .gpu-meta span::after { content: '•'; margin-left: 6px; color: var(--border-subtle); }
    .gpu-meta span:last-child::after { content: ''; }

    .gpu-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .api-badge {
      font-size: 0.7rem; padding: 2px 6px; border-radius: 4px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle);
      color: var(--text-muted); font-family: monospace;
    }

    .card-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-subtle);
    }

    .gpu-score { text-align: right; }
    .gpu-score .val { font-size: 1.1rem; font-weight: 700; color: var(--accent-primary); }
    .gpu-score .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .gpu-diff { text-align: right; }
    .gpu-diff .val { font-size: 0.9rem; font-weight: 600; }
    .gpu-diff.positive .val { color: var(--success); }
    .gpu-diff.negative .val { color: var(--danger); }
    
    .gpu-specs { font-size: 0.8rem; color: var(--text-muted); text-align: right; }
    .gpu-specs span { display: block; }

    /* =========================================
       MODAL
       ========================================= */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 200; justify-content: center; align-items: center;
      padding: 20px;
    }
    .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-content {
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      padding: 0; border-radius: var(--radius-lg);
      max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border-subtle);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: rgba(30, 41, 59, 0.95);
      z-index: 10;
    }
    [data-theme="light"] .modal-header { background: rgba(255, 255, 255, 0.95); }

    .modal-header h2 { font-size: 1.2rem; font-weight: 700; }
    .close-btn {
      background: transparent; border: none; color: var(--text-muted);
      font-size: 1.5rem; cursor: pointer; padding: 4px; line-height: 1;
    }
    .close-btn:hover { color: var(--text-main); }

    .modal-body { padding: 24px; }

    .compare-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;
    }
    
    .compare-item {
      background: rgba(255,255,255,0.02); border-radius: var(--radius-md);
      padding: 16px; border: 1px solid var(--border-subtle);
    }
    .compare-item h4 { 
      color: var(--accent-primary); margin-bottom: 12px; font-size: 1.1rem; 
      border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;
    }
    .compare-item p { font-size: 0.9rem; margin: 8px 0; color: var(--text-muted); }
    .compare-item strong { color: var(--text-main); }

    .api-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
      margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-subtle);
    }
    .api-item { text-align: center; padding: 6px; background: rgba(0,0,0,0.2); border-radius: 4px; }
    [data-theme="light"] .api-item { background: rgba(0,0,0,0.03); }
    .api-item .api-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
    .api-item .api-val { font-size: 0.85rem; font-weight: 600; color: var(--accent-primary); }

    .comparison-verdict {
      text-align: center; padding: 16px; background: rgba(56, 189, 248, 0.05);
      border-radius: var(--radius-md); border: 1px solid rgba(56, 189, 248, 0.1);
    }
    .diff-faster { color: var(--success); }
    .diff-slower { color: var(--danger); }

    /* =========================================
       UTILS & RESPONSIVE
       ========================================= */
    .theme-toggle, .craptop-link {
      background: var(--bg-panel); border: 1px solid var(--border-subtle);
      color: var(--text-main); padding: 8px 12px; border-radius: var(--radius-md);
      cursor: pointer; font-size: 1.1rem; transition: var(--transition);
    }
    .theme-toggle:hover { border-color: var(--accent-primary); }
    
    .scrape-status {
      margin-top: 15px; padding: 12px; border-radius: var(--radius-md);
      font-size: 0.9rem; display: none;
    }
    .scrape-status.loading { background: rgba(56, 189, 248, 0.1); color: var(--accent-primary); border: 1px solid rgba(56, 189, 248, 0.1); }
    .scrape-status.done { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.1); }
    .scrape-status.error { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.1); }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .gpu-list { grid-template-columns: 1fr; }
      .compare-row { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      .header-actions { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>⚡ GPU Performance Database</h1>
    <p>Search 400+ GPUs (2006–2026) • Compare scores • Filter by brand</p>
  </div>
  <div class="header-actions">
    <a href="https://www.reddit.com/r/Craptopgamingadvice/" target="_blank" rel="noopener noreferrer" class="craptop-link" title="Visit CraptopGaming Advice">
      <img src="craptop-banner.png" alt="Craptop Gaming Advice" style="height: 36px; border-radius: 4px;">
    </a>
    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌙</button>
  </div>
</div>

<div class="container">
  <div class="control-panel">
    <div class="search-row">
      <div class="input-wrapper">
        <span class="input-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search GPU (e.g., RTX 4090, RX 6800)..." autocomplete="off">
        <div id="suggestionsBox" class="suggestions-box"></div>
      </div>
      <button class="btn btn-primary" onclick="searchGPU()">Search</button>
      <button class="btn btn-secondary" onclick="clearSearch()">Clear</button>
    </div>
    
    <div class="filter-btns">
      <button class="filter-btn active" onclick="filterList('all', this)">All</button>
      <button class="filter-btn" onclick="filterList('nvidia', this)">NVIDIA</button>
      <button class="filter-btn" onclick="filterList('amd', this)">AMD</button>
      <button class="filter-btn" onclick="filterList('intel', this)">Intel</button>
      <button class="filter-btn" onclick="filterList('igpu', this)">iGPUs</button>
    </div>
  </div>

  <div id="statusBar" class="scrape-status"></div>

  <div id="resultsSection" class="hidden">
    <div class="results-header">
      <h2 id="resultsTitle">Search Results</h2>
      <span id="resultsCount"></span>
    </div>
    <div class="gpu-list" id="gpuList"></div>
  </div>

  <div id="comparisonModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚖️ GPU Comparison</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="compareContent"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CORE STATE
// ============================================================
let currentFilter = 'all';
let lastSearch = null;
let GPU_DB = [];
let isLoading = false;

// ============================================================
// INIT & THEME
// ============================================================
function init() {
  setupTheme();
  setupSuggestions();
  loadDatabase();
}

function setupTheme() {
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('gpu-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'dark' ? '🌙' : '☀️';
  
  toggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('gpu-theme', next);
    toggle.textContent = next === 'dark' ? '🌙' : '☀️';
  });
}

// ============================================================
// DATABASE LOADING
// ============================================================
async function loadDatabase() {
  showStatus('Initializing database...', 'loading');
  try {
    const res = await fetch('gpus.json');
    if (!res.ok) throw new Error('Failed to load gpus.json');
    const data = await res.json();
    GPU_DB.push(...data);
    finalizeInit();
  } catch (err) {
    console.warn('gpus.json not found. Using fallback dataset.', err);
    // Fallback for testing
    GPU_DB.push(
      {name:"RTX 4090",brand:"nvidia",type:"dGPU",year:2022,score:78500,vram:"24GB GDDR6X",tdp:450,arch:"Ada Lovelace"},
      {name:"RX 7900 XTX",brand:"amd",type:"dGPU",year:2022,score:52000,vram:"24GB GDDR6",tdp:355,arch:"RDNA 3"},
      {name:"Core Ultra 9 288V",brand:"intel",type:"igpu",year:2024,score:12000,vram:"Shared",tdp:35,arch:"Xe2"},
      {name:"GTX 1080 Ti",brand:"nvidia",type:"dGPU",year:2017,score:24000,vram:"11GB GDDR5X",tdp:250,arch:"Pascal"},
      {name:"RX 580 8GB",brand:"amd",type:"dGPU",year:2017,score:10000,vram:"8GB GDDR5",tdp:185,arch:"GCN 5"},
      {name:"RTX 3080",brand:"nvidia",type:"dGPU",year:2020,score:43000,vram:"10GB GDDR6X",tdp:320,arch:"Ampere"},
      {name:"RX 6800 XT",brand:"amd",type:"dGPU",year:2020,score:39000,vram:"16GB GDDR6",tdp:300,arch:"RDNA 2"},
      {name:"RTX 4070 Ti",brand:"nvidia",type:"dGPU",year:2023,score:38000,vram:"12GB GDDR6X",tdp:285,arch:"Ada Lovelace"}
    );
    finalizeInit();
  }
}

function finalizeInit() {
  GPU_DB.forEach(gpu => {
    const y = gpu.year;
    gpu.dx_hw = y < 2006 ? "DX8.1" : y < 2009 ? "DX9.0c" : y < 2012 ? "DX10.1" : y < 2015 ? "DX11" : y < 2020 ? "DX12" : y < 2024 ? "DX12_1" : "DX12_2";
    gpu.dx_sw = y < 2006 ? "SM 2.0" : y < 2009 ? "SM 3.0" : y < 2012 ? "SM 4.1" : y < 2015 ? "SM 5.0" : y < 2020 ? "SM 5.1" : y < 2024 ? "SM 6.3" : "SM 6.7";
    gpu.vulkan = y < 2016 ? "N/A" : y < 2019 ? "1.0" : y < 2021 ? "1.1" : y < 2023 ? "1.2" : "1.3";
    gpu.opengl = y < 2006 ? "2.0" : y < 2009 ? "2.1" : y < 2012 ? "3.0" : y < 2015 ? "3.3" : y < 2018 ? "4.1" : y < 2020 ? "4.5" : "4.6 (DRM)";
  });
  renderList(GPU_DB);
  showStatus('Database loaded successfully.', 'done');
}

// ============================================================
// SEARCH & SUGGESTIONS
// ============================================================
function setupSuggestions() {
  const input = document.getElementById('searchInput');
  const box = document.getElementById('suggestionsBox');
  let timeout;

  input.addEventListener('input', function() {
    clearTimeout(timeout);
    const query = this.value.trim().toLowerCase();
    box.innerHTML = '';
    if (query.length < 1) { box.classList.remove('active'); return; }

    timeout = setTimeout(() => {
      const matches = GPU_DB.filter(gpu => {
        const nameMatch = gpu.name.toLowerCase().includes(query);
        const archMatch = gpu.arch.toLowerCase().includes(query);
        const yearMatch = gpu.year.toString().includes(query);
        return nameMatch || archMatch || yearMatch;
      }).slice(0, 8);

      if (matches.length > 0) {
        matches.forEach(match => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.innerHTML = `<span>${match.name}</span><span class="suggestion-meta">${match.arch} • ${match.year}</span>`;
          div.onclick = () => {
            input.value = match.name;
            box.classList.remove('active');
            searchGPU(match);
          };
          box.appendChild(div);
        });
        box.classList.add('active');
      } else {
        box.classList.remove('active');
      }
    }, 150);
  });

  document.addEventListener('click', function(e) {
    if (e.target !== input) box.classList.remove('active');
  });
  
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      searchGPU();
      box.classList.remove('active');
    }
  });
}

function searchGPU(specificMatch = null) {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query && !specificMatch) { clearSearch(); return; }

  let baseCard = specificMatch;
  if (!baseCard) {
    baseCard = GPU_DB.find(g => g.name.toLowerCase() === query) || GPU_DB.find(g => g.name.toLowerCase().includes(query));
    if (baseCard) document.getElementById('searchInput').value = baseCard.name;
    if (!baseCard) { showStatus('No GPU found matching that name.', 'error'); return; }
  }

  lastSearch = baseCard;
  showSimilarCards(baseCard);
}

// ============================================================
// RENDERING
// ============================================================
function showSimilarCards(baseCard) {
  const resultsSection = document.getElementById('resultsSection');
  const resultsTitle = document.getElementById('resultsTitle');
  const resultsCount = document.getElementById('resultsCount');
  const gpuList = document.getElementById('gpuList');

  let similar = GPU_DB
    .map(gpu => {
      const diff = gpu.score - baseCard.score;
      const pctDiff = ((diff / baseCard.score) * 100).toFixed(1);
      return { ...gpu, diff, pctDiff, isBase: gpu.name === baseCard.name };
    })
    .sort((a, b) => a.diff - b.diff);

  const filtered = similar.filter(g => !g.isBase);
  const faster = filtered.filter(g => g.diff < 0).sort((a, b) => b.diff - a.diff).slice(0, 7);
  const slower = filtered.filter(g => g.diff > 0).sort((a, b) => a.diff - b.diff).slice(0, 8);
  const finalList = [...faster, baseCard, ...slower];

  resultsSection.classList.remove('hidden');
  resultsTitle.textContent = `Similar to: ${baseCard.name}`;
  resultsCount.textContent = `${finalList.length} cards shown`;

  gpuList.innerHTML = finalList.map((gpu, i) => {
    const isBase = gpu.isBase;
    const isFaster = gpu.diff > 0;
    const isSlower = gpu.diff < 0;
    const cardClass = isBase ? 'base-card' : (isFaster ? 'faster' : 'slower');
    const diffClass = isFaster ? 'positive' : 'negative';
    const diffIcon = isFaster ? '+' : '';
    const rankClass = i < 3 ? 'top3' : '';

    return `
      <div class="gpu-card ${cardClass}" data-card1='${JSON.stringify(baseCard).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
        <div class="card-top">
            <div class="gpu-name">
                <h3>${gpu.name} ${isBase ? '<span class="base-label">(BASE)</span>' : ''}</h3>
                <div class="gpu-meta">
                    <span>${gpu.arch}</span>
                    <span>${gpu.year}</span>
                    <span>${gpu.vram}</span>
                </div>
                <div class="gpu-tags">
                    <span class="api-badge">DX:${gpu.dx_hw}</span>
                    <span class="api-badge">VK:${gpu.vulkan}</span>
                    <span class="api-badge">GL:${gpu.opengl}</span>
                </div>
            </div>
            <div class="gpu-rank ${rankClass}">#${i + 1}</div>
        </div>
        
        <div class="card-bottom">
            <div class="gpu-diff ${diffClass}">
                <div class="val">${diffIcon}${gpu.pctDiff}%</div>
                <div class="label">Diff</div>
            </div>
            <div class="gpu-score">
                <div class="val">${gpu.score.toLocaleString()}</div>
                <div class="label">Score</div>
            </div>
        </div>
        <div class="gpu-specs">
            <span>${gpu.tdp}W • ${gpu.brand.toUpperCase()}</span>
        </div>
      </div>
    `;
  }).join('');

  showStatus(`Found 15 cards with similar performance to ${baseCard.name}. Click a card to compare.`, 'done');
}

function renderList(gpus) {
  const container = document.getElementById('gpuList');
  const resultsSection = document.getElementById('resultsSection');
  const resultsTitle = document.getElementById('resultsTitle');
  const resultsCount = document.getElementById('resultsCount');
  
  const sortedGpus = [...gpus].sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.name.localeCompare(b.name);
  });

  container.innerHTML = sortedGpus.slice(0, 300).map((gpu, i) => `
    <div class="gpu-card" data-card1='${JSON.stringify(lastSearch || gpus[0]).replace(/'/g, "&#39;")}' data-card2='${JSON.stringify(gpu).replace(/'/g, "&#39;")}' onclick="showComparison(JSON.parse(this.dataset.card1), JSON.parse(this.dataset.card2))">
      <div class="card-top">
        <div class="gpu-name">
          <h3>${gpu.name}</h3>
          <div class="gpu-meta">
            <span>${gpu.arch}</span>
            <span>${gpu.year}</span>
            <span>${gpu.vram}</span>
          </div>
          <div class="gpu-tags">
              <span class="api-badge">DX:${gpu.dx_hw}</span>
              <span class="api-badge">VK:${gpu.vulkan}</span>
              <span class="api-badge">GL:${gpu.opengl}</span>
          </div>
        </div>
        <div class="gpu-rank">${i + 1}</div>
      </div>
      
      <div class="card-bottom">
        <div class="gpu-score">
          <div class="val">${gpu.score.toLocaleString()}</div>
          <div class="label">Score</div>
        </div>
        <div class="gpu-specs">
            <span>${gpu.tdp}W</span>
            <span>${gpu.brand.toUpperCase()}</span>
        </div>
      </div>
    </div>
  `).join('');
  
  resultsSection.classList.remove('hidden');
  resultsTitle.textContent = filterLabel(currentFilter);
  resultsCount.textContent = `${gpus.length} cards found`;
}

// ============================================================
// COMPARISON MODAL
// ============================================================
function showComparison(card1, card2) {
  const modal = document.getElementById('comparisonModal');
  const content = document.getElementById('compareContent');
  
  const pctDiff = ((card2.score - card1.score) / card1.score * 100).toFixed(1);
  const faster = card2.score > card1.score;
  const diffClass = faster ? 'diff-faster' : 'diff-slower';
  const diffIcon = faster ? '+' : '';

  const renderAPI = (gpu) => `
    <div class="api-grid">
      <div class="api-item"><div class="api-label">DX HW</div><div class="api-val">${gpu.dx_hw || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">DX SW</div><div class="api-val">${gpu.dx_sw || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">Vulkan</div><div class="api-val">${gpu.vulkan || 'N/A'}</div></div>
      <div class="api-item"><div class="api-label">OpenGL</div><div class="api-val">${gpu.opengl || 'N/A'}</div></div>
    </div>
  `;

  content.innerHTML = `
    <div class="compare-row">
      <div class="compare-item">
        <h4>${card1.name}</h4>
        <p><strong>Score:</strong> ${card1.score.toLocaleString()}</p>
        <p><strong>Architecture:</strong> ${card1.arch}</p>
        <p><strong>VRAM:</strong> ${card1.vram}</p>
        <p><strong>TDP:</strong> ${card1.tdp}W</p>
        <p><strong>Year:</strong> ${card1.year}</p>
        ${renderAPI(card1)}
      </div>
      <div class="compare-item">
        <h4>${card2.name}</h4>
        <p><strong>Score:</strong> ${card2.score.toLocaleString()}</p>
        <p><strong>Architecture:</strong> ${card2.arch}</p>
        <p><strong>VRAM:</strong> ${card2.vram}</p>
        <p><strong>TDP:</strong> ${card2.tdp}W</p>
        <p><strong>Year:</strong> ${card2.year}</p>
        ${renderAPI(card2)}
      </div>
    </div>
    <div class="comparison-verdict">
      <p style="font-size:1.1rem; color:var(--text-muted); margin-bottom:8px;">
        Comparison Result
      </p>
      <p style="font-size:1.2rem;">
        ${card2.name} is <strong class="${diffClass}" style="font-size:1.4rem;">${diffIcon}${pctDiff}%</strong> 
        ${faster ? 'faster' : 'slower'} than ${card1.name}
      </p>
    </div>
  `;
  
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('comparisonModal').classList.remove('active');
}

// ============================================================
// UTILITIES
// ============================================================
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultsSection').classList.add('hidden');
  document.getElementById('statusBar').style.display = 'none';
  document.getElementById('suggestionsBox').classList.remove('active');
  lastSearch = null;
  renderList(GPU_DB);
}

function filterList(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  let filtered = GPU_DB;
  if (filter === 'nvidia') filtered = GPU_DB.filter(g => g.brand === 'nvidia');
  else if (filter === 'amd') filtered = GPU_DB.filter(g => g.brand === 'amd');
  else if (filter === 'intel') filtered = GPU_DB.filter(g => g.brand === 'intel');
  else if (filter === 'igpu') filtered = GPU_DB.filter(g => g.type === 'igpu');
  
  renderList(filtered);
}

function filterLabel(f) {
  if (f === 'all') return 'All GPUs in Database';
  if (f === 'nvidia') return 'NVIDIA GPUs';
  if (f === 'amd') return 'AMD GPUs';
  if (f === 'intel') return 'Intel iGPUs';
  if (f === 'igpu') return 'Integrated GPUs';
  return 'GPUs';
}

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = `scrape-status ${type}`;
  bar.style.display = 'block';
  setTimeout(() => { bar.style.display = 'none'; }, 5000);
}

// Initialize
init();
</script>
</body>
</html>
