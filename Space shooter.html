<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Blaster - Space Shooter</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
}
canvas {
    border: 2px solid #1a1a3e;
    box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
}
#ui-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #fff;
    pointer-events: none;
    z-index: 10;
}
#ui-overlay.hidden { display: none; }
#ui-overlay h1 {
    font-size: 48px;
    color: #00d4ff;
    text-shadow: 0 0 20px #00d4ff, 0 0 40px #0066ff;
    margin-bottom: 10px;
    letter-spacing: 6px;
}
#ui-overlay h2 {
    font-size: 28px;
    color: #ff4444;
    text-shadow: 0 0 15px #ff4444;
    margin-bottom: 10px;
}
#ui-overlay p {
    font-size: 16px;
    color: #aaa;
    margin: 5px 0;
}
#ui-overlay .start-text {
    font-size: 20px;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
    animation: pulse 1.5s infinite;
    margin-top: 20px;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay">
    <h1>VOID BLASTER</h1>
    <p>WASD / Arrow Keys to move</p>
    <p>Click or Space to shoot</p>
    <p class="start-text">Press ENTER to start</p>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('ui-overlay');

canvas.width = 800;
canvas.height = 600;

// Game state
let gameState = 'menu'; // menu, playing, gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('voidBlasterHigh')) || 0;
let wave = 1;
let waveTimer = 0;
let waveDelay = 180;
let screenShake = 0;
let slowMo = 0;

// Input
const keys = {};
let mouseDown = false;
let mouseX = 0, mouseY = 0;

document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'Enter' && gameState === 'menu') startGame();
    if (e.key === 'Enter' && gameState === 'gameover') startGame();
    if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousedown', e => { mouseDown = true; if (gameState === 'playing') shoot(); });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

// Player
const player = {
    x: 400, y: 500, w: 30, h: 36,
    speed: 5, hp: 100, maxHp: 100,
    fireRate: 8, fireTimer: 0,
    invincible: 0,
    powerLevel: 1,
    powerTimer: 0,
    shieldActive: false, shieldTimer: 0, shieldAngle: 0
};

// Arrays
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];
let powerups = [];
let enemyBullets = [];
let floatingTexts = [];

// Initialize stars
function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 1.5 + 0.3,
            brightness: Math.random()
        });
    }
}
initStars();

// Start game
function startGame() {
    gameState = 'playing';
    score = 0;
    wave = 1;
    waveTimer = 0;
    player.x = canvas.width / 2;
    player.y = canvas.height - 80;
    player.hp = 100;
    player.powerLevel = 1;
    player.powerTimer = 0;
    player.shieldActive = false;
    player.shieldTimer = 0;
    player.invincible = 0;
    bullets = [];
    enemies = [];
    particles = [];
    powerups = [];
    enemyBullets = [];
    floatingTexts = [];
    overlay.classList.add('hidden');
}

// Shoot
function shoot() {
    if (player.fireTimer > 0) return;
    player.fireTimer = player.fireRate;

    const bSpeed = -10;
    if (player.powerLevel >= 3) {
        bullets.push({ x: player.x - 12, y: player.y - 18, vx: -1, vy: bSpeed, damage: 10, color: '#00ffcc' });
        bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: bSpeed, damage: 15, color: '#00d4ff' });
        bullets.push({ x: player.x + 12, y: player.y - 18, vx: 1, vy: bSpeed, damage: 10, color: '#00ffcc' });
    } else if (player.powerLevel >= 2) {
        bullets.push({ x: player.x - 8, y: player.y - 18, vx: 0, vy: bSpeed, damage: 12, color: '#00d4ff' });
        bullets.push({ x: player.x + 8, y: player.y - 18, vx: 0, vy: bSpeed, damage: 12, color: '#00d4ff' });
    } else {
        bullets.push({ x: player.x, y: player.y - 18, vx: 0, vy: bSpeed, damage: 10, color: '#00d4ff' });
    }

    // Muzzle flash particles
    for (let i = 0; i < 3; i++) {
        particles.push(createParticle(player.x, player.y - 20, '#00d4ff', 3, 15));
    }
}

// Spawn enemy
function spawnEnemy() {
    const types = ['basic', 'fast', 'tank', 'shooter', 'zigzag'];
    let available = ['basic'];
    if (wave >= 2) available.push('fast');
    if (wave >= 3) available.push('tank', 'shooter');
    if (wave >= 4) available.push('zigzag');

    const type = available[Math.floor(Math.random() * available.length)];
    const x = Math.random() * (canvas.width - 60) + 30;

    const templates = {
        basic: { hp: 20, speed: 1.5, size: 18, color: '#ff4444', score: 10, fireRate: 0 },
        fast: { hp: 12, speed: 3.5, size: 14, color: '#ffaa00', score: 15, fireRate: 0 },
        tank: { hp: 60, speed: 0.8, size: 28, color: '#aa44ff', score: 30, fireRate: 0 },
        shooter: { hp: 30, speed: 1.2, size: 20, color: '#ff6644', score: 25, fireRate: 90 },
        zigzag: { hp: 25, speed: 2, size: 16, color: '#44ffaa', score: 20, fireRate: 0 }
    };

    const t = templates[type];
    enemies.push({
        x, y: -t.size,
        type,
        hp: t.hp + wave * 3,
        maxHp: t.hp + wave * 3,
        speed: t.speed,
        size: t.size,
        color: t.color,
        score: t.score,
        fireRate: t.fireRate,
        fireTimer: Math.random() * t.fireRate,
        angle: 0,
        zigTimer: Math.random() * Math.PI * 2,
        flashTimer: 0
    });
}

// Spawn powerup
function spawnPowerup(x, y) {
    if (Math.random() > 0.15) return;
    const types = ['power', 'health', 'shield'];
    const type = types[Math.floor(Math.random() * types.length)];
    const colors = { power: '#ffdd00', health: '#00ff66', shield: '#00aaff' };
    powerups.push({
        x, y, type, color: colors[type],
        size: 12, vy: 1.5, timer: 300,
        angle: 0
    });
}

// Create particle
function createParticle(x, y, color, size, life) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    return {
        x, y, color, size,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life, maxLife: life,
        decay: Math.random() * 0.02 + 0.02
    };
}

// Explosion
function explode(x, y, color, count = 20) {
    for (let i = 0; i < count; i++) {
        particles.push(createParticle(x, y, color, Math.random() * 4 + 2, Math.random() * 30 + 15));
    }
    // Ring
    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        particles.push({
            x, y, color: '#ffffff', size: 3,
            vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
            life: 20, maxLife: 20, decay: 0.05
        });
    }
}

// Floating text
function addFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, life: 60, vy: -1.5 });
}

// Collision
function collides(a, b) {
    return Math.abs(a.x - b.x) < (a.w || a.size) &&
           Math.abs(a.y - b.y) < (a.h || a.size);
}

// Update
function update() {
    if (gameState !== 'playing') return;

    const dt = slowMo > 0 ? 0.5 : 1;
    if (slowMo > 0) slowMo--;

    // Screen shake decay
    if (screenShake > 0) screenShake *= 0.9;
    if (screenShake < 0.1) screenShake = 0;

    // Player movement
    let dx = 0, dy = 0;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    player.x += dx * player.speed * dt;
    player.y += dy * player.speed * dt;
    player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
    player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

    // Auto-fire with mouse hold
    if (mouseDown) shoot();
    if (keys[' ']) shoot();
    if (player.fireTimer > 0) player.fireTimer -= dt;

    // Invincibility
    if (player.invincible > 0) player.invincible -= dt;

    // Power timer
    if (player.powerTimer > 0) {
        player.powerTimer -= dt;
        if (player.powerTimer <= 0) player.powerLevel = 1;
    }

    // Shield
    if (player.shieldTimer > 0) {
        player.shieldTimer -= dt;
        player.shieldAngle += 0.05;
        if (player.shieldTimer <= 0) player.shieldActive = false;
    }

    // Wave management
    if (enemies.length === 0) {
        waveTimer++;
        if (waveTimer >= waveDelay) {
            wave++;
            waveTimer = 0;
            const count = 3 + wave * 2;
            for (let i = 0; i < count; i++) {
                setTimeout(() => { if (gameState === 'playing') spawnEnemy(); }, i * 200);
            }
        }
    }

    // Update bullets
    bullets = bullets.filter(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        return b.y > -10 && b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10;
    });

    // Update enemy bullets
    enemyBullets = enemyBullets.filter(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        return b.y > -10 && b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10;
    });

    // Update enemies
    enemies = enemies.filter(e => {
        e.y += e.speed * dt;
        e.angle += 0.02;
        e.flashTimer = Math.max(0, e.flashTimer - dt);

        if (e.type === 'zigzag') {
            e.zigTimer += 0.03 * dt;
            e.x += Math.sin(e.zigTimer) * 3;
        }

        // Shooting enemies
        if (e.fireRate > 0) {
            e.fireTimer -= dt;
            if (e.fireTimer <= 0) {
                e.fireTimer = e.fireRate;
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                const speed = 3;
                enemyBullets.push({
                    x: e.x, y: e.y + e.size,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 5, color: '#ff4444'
                });
            }
        }

        return e.y < canvas.height + 50 && e.hp > 0;
    });

    // Bullet-enemy collision
    bullets.forEach((b, bi) => {
        enemies.forEach(e => {
            if (Math.abs(b.x - e.x) < e.size + 5 && Math.abs(b.y - e.y) < e.size + 5) {
                e.hp -= b.damage;
                e.flashTimer = 4;
                bullets.splice(bi, 1);

                // Hit particles
                for (let i = 0; i < 5; i++) {
                    particles.push(createParticle(b.x, b.y, e.color, 2, 15));
                }

                if (e.hp <= 0) {
                    score += e.score;
                    explode(e.x, e.y, e.color, 30);
                    screenShake = 5;
                    addFloatingText(e.x, e.y, '+' + e.score, '#ffdd00');
                    spawnPowerup(e.x, e.y);
                }
            }
        });
    });

    // Enemy bullet - player collision
    if (player.invincible <= 0) {
        enemyBullets.forEach((b, bi) => {
            if (Math.abs(b.x - player.x) < 12 && Math.abs(b.y - player.y) < 16) {
                enemyBullets.splice(bi, 1);
                if (player.shieldActive) {
                    player.shieldActive = false;
                    player.shieldTimer = 0;
                    explode(player.x, player.y, '#00aaff', 15);
                } else {
                    player.hp -= 10;
                    player.invincible = 30;
                    screenShake = 8;
                    explode(player.x, player.y, '#ff4444', 10);
                }
            }
        });

        // Enemy-player collision
        enemies.forEach((e, ei) => {
            if (Math.abs(e.x - player.x) < e.size + 10 && Math.abs(e.y - player.y) < e.size + 14) {
                if (player.shieldActive) {
                    player.shieldActive = false;
                    player.shieldTimer = 0;
                    e.hp -= 30;
                    explode(player.x, player.y, '#00aaff', 15);
                    if (e.hp <= 0) {
                        score += e.score;
                        explode(e.x, e.y, e.color, 30);
                    }
                } else {
                    player.hp -= 25;
                    player.invincible = 45;
                    screenShake = 12;
                    explode(player.x, player.y, '#ff4444', 20);
                    e.hp -= 20;
                    if (e.hp <= 0) {
                        score += e.score;
                        explode(e.x, e.y, e.color, 30);
                    }
                }
            }
        });
    }

    // Powerup collision
    powerups = powerups.filter(p => {
        p.y += p.vy;
        p.timer--;
        p.angle += 0.05;
        if (p.timer <= 0 || p.y > canvas.height + 20) return false;

        if (Math.abs(p.x - player.x) < 25 && Math.abs(p.y - player.y) < 25) {
            if (p.type === 'power') {
                player.powerLevel = Math.min(3, player.powerLevel + 1);
                player.powerTimer = 600;
                addFloatingText(p.x, p.y, 'POWER UP!', '#ffdd00');
            } else if (p.type === 'health') {
                player.hp = Math.min(player.maxHp, player.hp + 30);
                addFloatingText(p.x, p.y, '+30 HP', '#00ff66');
            } else if (p.type === 'shield') {
                player.shieldActive = true;
                player.shieldTimer = 300;
                addFloatingText(p.x, p.y, 'SHIELD!', '#00aaff');
            }
            explode(p.x, p.y, p.color, 10);
            return false;
        }
        return true;
    });

    // Update particles
    particles = particles.filter(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life -= dt;
        return p.life > 0;
    });

    // Update floating texts
    floatingTexts = floatingTexts.filter(t => {
        t.y += t.vy;
        t.life -= dt;
        return t.life > 0;
    });

    // Update stars
    stars.forEach(s => {
        s.y += s.speed * dt;
        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
        s.brightness = 0.5 + Math.sin(Date.now() * 0.003 + s.x) * 0.3;
    });

    // Player death
    if (player.hp <= 0) {
        gameState = 'gameover';
        explode(player.x, player.y, '#00d4ff', 50);
        explode(player.x, player.y, '#ffffff', 30);
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('voidBlasterHigh', highScore);
        }
        overlay.classList.remove('hidden');
        overlay.innerHTML = `
            <h2>GAME OVER</h2>
            <p>Score: ${score.toLocaleString()}</p>
            <p>Wave: ${wave}</p>
            <p>High Score: ${highScore.toLocaleString()}</p>
            <p class="start-text">Press ENTER to restart</p>
        `;
    }
}

// Draw
function draw() {
    ctx.save();

    // Screen shake
    if (screenShake > 0) {
        ctx.translate(
            (Math.random() - 0.5) * screenShake * 2,
            (Math.random() - 0.5) * screenShake * 2
        );
    }

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#050510');
    grad.addColorStop(0.5, '#0a0a2e');
    grad.addColorStop(1, '#0f0f1a');
    ctx.fillStyle = grad;
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

    // Stars
    stars.forEach(s => {
        ctx.globalAlpha = s.brightness;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    if (gameState === 'playing' || gameState === 'gameover') {
        // Powerups
        powerups.forEach(p => {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);

            // Glow
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 15;

            // Outer ring
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, p.size, 0, Math.PI * 2);
            ctx.stroke();

            // Inner symbol
            ctx.fillStyle = p.color;
            ctx.font = 'bold 14px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const symbols = { power: 'P', health: '+', shield: 'S' };
            ctx.fillText(symbols[p.type], 0, 0);

            ctx.shadowBlur = 0;
            ctx.restore();
        });

        // Enemy bullets
        enemyBullets.forEach(b => {
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 10;
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Enemies
        enemies.forEach(e => {
            ctx.save();
            ctx.translate(e.x, e.y);

            // Glow
            ctx.shadowColor = e.flashTimer > 0 ? '#ffffff' : e.color;
            ctx.shadowBlur = e.flashTimer > 0 ? 20 : 10;

            // Body
            ctx.fillStyle = e.flashTimer > 0 ? '#ffffff' : e.color;
            ctx.beginPath();
            if (e.type === 'tank') {
                // Hexagon
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const px = Math.cos(a) * e.size;
                    const py = Math.sin(a) * e.size;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
            } else if (e.type === 'fast') {
                // Triangle pointing down
                ctx.moveTo(0, e.size);
                ctx.lineTo(-e.size, -e.size * 0.6);
                ctx.lineTo(e.size, -e.size * 0.6);
                ctx.closePath();
            } else if (e.type === 'shooter') {
                // Diamond
                ctx.moveTo(0, e.size);
                ctx.lineTo(-e.size * 0.7, 0);
                ctx.lineTo(0, -e.size);
                ctx.lineTo(e.size * 0.7, 0);
                ctx.closePath();
            } else {
                // Basic - inverted triangle
                ctx.moveTo(0, e.size);
                ctx.lineTo(-e.size, -e.size * 0.5);
                ctx.lineTo(e.size, -e.size * 0.5);
                ctx.closePath();
            }
            ctx.fill();

            // HP bar
            if (e.hp < e.maxHp) {
                const barW = e.size * 1.5;
                const barH = 3;
                ctx.fillStyle = '#333';
                ctx.fillRect(-barW / 2, -e.size - 10, barW, barH);
                ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#00ff66' : e.hp / e.maxHp > 0.25 ? '#ffaa00' : '#ff4444';
                ctx.fillRect(-barW / 2, -e.size - 10, barW * (e.hp / e.maxHp), barH);
            }

            ctx.shadowBlur = 0;
            ctx.restore();
        });

        // Player bullets
        bullets.forEach(b => {
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 12;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x - 2, b.y - 8, 4, 16);

            // Tip glow
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(b.x - 1, b.y - 8, 2, 4);
            ctx.shadowBlur = 0;
        });

        // Player
        if (gameState === 'playing') {
            ctx.save();
            ctx.translate(player.x, player.y);

            // Flicker when invincible
            if (player.invincible > 0 && Math.floor(player.invincible) % 4 < 2) {
                ctx.globalAlpha = 0.4;
            }

            // Engine glow
            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 20;
            const engineLen = 8 + Math.random() * 6;
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.moveTo(-6, 14);
            ctx.lineTo(0, 14 + engineLen);
            ctx.lineTo(6, 14);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#66ccff';
            ctx.beginPath();
            ctx.moveTo(-3, 14);
            ctx.lineTo(0, 14 + engineLen * 0.6);
            ctx.lineTo(3, 14);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Ship body
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#00d4ff';
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(-15, 14);
            ctx.lineTo(-6, 10);
            ctx.lineTo(0, 14);
            ctx.lineTo(6, 10);
            ctx.lineTo(15, 14);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = '#88eeff';
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(-5, 4);
            ctx.lineTo(5, 4);
            ctx.closePath();
            ctx.fill();

            // Wing accents
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-12, 8);
            ctx.lineTo(-4, -4);
            ctx.moveTo(12, 8);
            ctx.lineTo(4, -4);
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            // Shield
            if (player.shieldActive) {
                ctx.strokeStyle = `rgba(0, 170, 255, ${0.4 + Math.sin(player.shieldAngle * 3) * 0.2})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(0, 0, 28, 0, Math.PI * 2);
                ctx.stroke();

                // Shield segments
                for (let i = 0; i < 6; i++) {
                    const a = player.shieldAngle + (i / 6) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.arc(Math.cos(a) * 28, Math.sin(a) * 28, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#00aaff';
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            ctx.restore();
        }

        // Particles
        particles.forEach(p => {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // Floating texts
        floatingTexts.forEach(t => {
            const alpha = t.life / 60;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = t.color;
            ctx.font = 'bold 16px Courier New';
            ctx.textAlign = 'center';
            ctx.shadowColor = t.color;
            ctx.shadowBlur = 10;
            ctx.fillText(t.text, t.x, t.y);
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // HUD
        // HP bar
        const hpBarW = 200, hpBarH = 14;
        const hpX = 20, hpY = 20;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(hpX, hpY, hpBarW, hpBarH);
        const hpRatio = player.hp / player.maxHp;
        const hpColor = hpRatio > 0.5 ? '#00ff66' : hpRatio > 0.25 ? '#ffaa00' : '#ff4444';
        ctx.fillStyle = hpColor;
        ctx.fillRect(hpX, hpY, hpBarW * hpRatio, hpBarH);
        ctx.strokeStyle = '#334';
        ctx.lineWidth = 1;
        ctx.strokeRect(hpX, hpY, hpBarW, hpBarH);
        ctx.fillStyle = '#fff';
        ctx.font = '11px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`, hpX + hpBarW / 2, hpY + 11);

        // Score
        ctx.textAlign = 'right';
        ctx.font = 'bold 22px Courier New';
        ctx.fillStyle = '#00d4ff';
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 10;
        ctx.fillText(`${score.toLocaleString()}`, canvas.width - 20, 35);
        ctx.shadowBlur = 0;

        // Wave
        ctx.textAlign = 'left';
        ctx.font = 'bold 16px Courier New';
        ctx.fillStyle = '#ffdd00';
        ctx.shadowColor = '#ffdd00';
        ctx.shadowBlur = 8;
        ctx.fillText(`WAVE ${wave}`, 20, canvas.height - 20);
        ctx.shadowBlur = 0;

        // Power level indicator
        if (player.powerTimer > 0) {
            ctx.textAlign = 'center';
            ctx.font = '12px Courier New';
            ctx.fillStyle = '#ffdd00';
            ctx.fillText(`POWER x${player.powerLevel} [${Math.ceil(player.powerTimer / 60)}s]`, canvas.width / 2, canvas.height - 20);
        }

        // Wave incoming text
        if (enemies.length === 0 && waveTimer > 0) {
            const alpha = Math.sin(waveTimer * 0.1) * 0.5 + 0.5;
            ctx.globalAlpha = alpha;
            ctx.textAlign = 'center';
            ctx.font = 'bold 28px Courier New';
            ctx.fillStyle = '#00d4ff';
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 15;
            ctx.fillText(`WAVE ${wave + 1} INCOMING`, canvas.width / 2, canvas.height / 2);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
    }

    ctx.restore();
}

// Game loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
